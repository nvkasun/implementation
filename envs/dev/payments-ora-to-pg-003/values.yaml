global:
  environment: dev
  deploymentId: payments-ora-to-pg-003

source:
  enabled: true
  name: ogg-oracle
  component: source
  engine: oracle
  replicas: 1
  containerName: ogg-oracle

  image:
    repository: 229410149234.dkr.ecr.eu-west-1.amazonaws.com/ogg-oracle
    tag: "23.26.2.0.1"
    pullPolicy: IfNotPresent

  ogg:
    deploymentName: OracleSource
    domain: ogg-oracle.gg-dev-payments-ora-to-pg-003.svc.cluster.local
    secureDeployment: false

  admin:
    existingSecret: ogg-oracle-admin
    usernameKey: OGG_ADMIN
    passwordKey: OGG_ADMIN_PWD

  csi:
    enabled: true
    region: eu-west-1
    serviceAccountRoleArn: arn:aws:iam::668311715351:role/GoldenGateSecretsReadRole-dev

    admin:
      # NOTE: dev/goldengate/admin-secret is a shared POC secret reused across all
      # payments-ora-to-pg-* deployments. Production should move to one admin
      # secret per deployment, e.g. dev/goldengate/payments-ora-to-pg-003/admin.
      enabled: true
      providerClassName: ogg-oracle-admin
      secretName: ogg-oracle-admin
      objectName: dev/goldengate/admin-secret
      objectType: secretsmanager
      mountPath: /mnt/secrets-store/admin
      jmesPath:
        - path: OGG_ADMIN
          objectAlias: OGG_ADMIN
        - path: OGG_ADMIN_PWD
          objectAlias: OGG_ADMIN_PWD

    certificate:
      enabled: true
      providerClassName: ogg-oracle-certificate
      objectName: dev/goldengate/certificate
      objectType: secretsmanager
      mountPath: /etc/nginx/cert
      jmesPath:
        - path: caKeyPem
          objectAlias: ogg.key
        - path: caCertPem
          objectAlias: ogg.pem
        - path: caChainPem
          objectAlias: ca-chain.pem

  initPermissions:
    enabled: true
    mode: "0777"

  serviceAccount:
    create: true
    name: ogg-oracle-sa
    annotations: {}

  service:
    type: ClusterIP
    ports:
      https: 8443
      dist: 9013
      metrics: 9015

  storage:
    u02:
      type: emptyDir
      existingClaim: ""
    u03:
      type: emptyDir

  readinessProbe:
    initialDelaySeconds: 180
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 20

  livenessProbe:
    initialDelaySeconds: 240
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 8

  resources: {}

  extraEnv: []
  extraVolumeMounts: []
  extraVolumes: []
  extraContainers: []

target:
  enabled: true
  name: ogg-postgresql
  component: target
  engine: postgresql
  replicas: 1
  containerName: ogg-postgresql

  image:
    repository: 229410149234.dkr.ecr.eu-west-1.amazonaws.com/ogg-postgresql
    tag: "23.26.2.0.1"
    pullPolicy: IfNotPresent

  ogg:
    deploymentName: PostgresqlTarget
    domain: ogg-postgresql.gg-dev-payments-ora-to-pg-003.svc.cluster.local
    secureDeployment: false

  admin:
    existingSecret: ogg-postgresql-admin
    usernameKey: OGG_ADMIN
    passwordKey: OGG_ADMIN_PWD

  csi:
    enabled: true
    region: eu-west-1
    serviceAccountRoleArn: arn:aws:iam::668311715351:role/GoldenGateSecretsReadRole-dev

    admin:
      # NOTE: dev/goldengate/admin-secret-target is a shared POC secret reused across
      # all payments-ora-to-pg-* target deployments. Production should move to one
      # admin secret per deployment, e.g. dev/goldengate/payments-ora-to-pg-003/target-admin.
      enabled: true
      providerClassName: ogg-postgresql-admin
      secretName: ogg-postgresql-admin
      objectName: dev/goldengate/admin-secret-target
      objectType: secretsmanager
      mountPath: /mnt/secrets-store/admin
      jmesPath:
        - path: OGG_ADMIN
          objectAlias: OGG_ADMIN
        - path: OGG_ADMIN_PWD
          objectAlias: OGG_ADMIN_PWD

    certificate:
      enabled: true
      providerClassName: ogg-postgresql-certificate
      objectName: dev/goldengate/certificate
      objectType: secretsmanager
      mountPath: /etc/nginx/cert
      jmesPath:
        - path: caKeyPem
          objectAlias: ogg.key
        - path: caCertPem
          objectAlias: ogg.pem
        - path: caChainPem
          objectAlias: ca-chain.pem

  initPermissions:
    enabled: true
    mode: "0777"

  serviceAccount:
    create: false
    name: ogg-oracle-sa
    annotations: {}

  service:
    type: ClusterIP
    ports:
      https: 8443
      receiver: 9014
      metrics: 9015

  storage:
    u02:
      type: emptyDir
      existingClaim: ""
    u03:
      type: emptyDir

  readinessProbe:
    initialDelaySeconds: 180
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 20

  livenessProbe:
    initialDelaySeconds: 240
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 8

  resources: {}

  extraEnv: []
  extraVolumeMounts: []
  extraVolumes: []
  extraContainers: []

ingress:
  enabled: true
  mode: shared
  className: alb

  hosts:
    source: ogg-oracle-payments-ora-to-pg-003.gg-dev.local
    target: ogg-postgresql-payments-ora-to-pg-003.gg-dev.local

  alb:
    groupName: gg-poc-dev-alb
    groupOrder: "110"
    backendProtocol: HTTPS
    listenPorts: '[{"HTTPS":443}]'
    healthcheckProtocol: HTTPS
    healthcheckPort: traffic-port
    healthcheckPath: /
    successCodes: "200-499"

  annotations: {}

configJob:
  enabled: false

monitoring:
  labels:
    enabled: true

podSecurityContext: {}

securityContext:
  runAsUser: 0
  runAsGroup: 0
  allowPrivilegeEscalation: false

nodeSelector: {}

tolerations: []

affinity: {}