global:
  environment: dev
  deploymentId: payments-ora-to-pg-001

source:
  enabled: true
  name: ogg-oracle
  component: source
  engine: oracle
  replicas: 1
  containerName: ogg-oracle

  image:
    repository: 229410149234.dkr.ecr.eu-west-1.amazonaws.com/ogg-oracle
    tag: "23.26.2.0.1"
    pullPolicy: IfNotPresent

  ogg:
    deploymentName: OracleSource
    domain: ogg-oracle.gg-dev-payments-ora-to-pg-001.svc.cluster.local
    secureDeployment: false

  admin:
    existingSecret: ogg-oracle-admin
    usernameKey: OGG_ADMIN
    passwordKey: OGG_ADMIN_PWD

  csi:
    enabled: true
    region: eu-west-1
    serviceAccountRoleArn: arn:aws:iam::668311715351:role/GoldenGateSecretsReadRole-dev

    admin:
      # NOTE: dev/goldengate/source/admin is a shared POC secret reused across all
      # payments-ora-to-pg-* deployments. Production should move to one admin
      # secret per deployment, e.g. dev/goldengate/source/payments-ora-to-pg-001/admin.
      enabled: true
      providerClassName: ogg-oracle-admin
      secretName: ogg-oracle-admin
      objectName: dev/goldengate/source/admin
      objectType: secretsmanager
      mountPath: /mnt/secrets-store/admin
      jmesPath:
        - path: OGG_ADMIN
          objectAlias: OGG_ADMIN
        - path: OGG_ADMIN_PWD
          objectAlias: OGG_ADMIN_PWD

    certificate:
      enabled: true
      providerClassName: ogg-oracle-certificate
      objectName: dev/goldengate/tls-certificate
      objectType: secretsmanager
      mountPath: /etc/nginx/cert
      jmesPath:
        - path: '"ogg.key"'
          objectAlias: ogg.key
        - path: '"ogg.pem"'
          objectAlias: ogg.pem
        - path: '"ca-chain.pem"'
          objectAlias: ca-chain.pem

  initPermissions:
    enabled: true
    mode: "0777"

  serviceAccount:
    create: true
    name: ogg-oracle-sa
    annotations: {}

  service:
    type: ClusterIP
    ports:
      https: 8443
      dist: 9013
      metrics: 9015

  # Phase 1: /u02 is EFS-backed (persistent trails/checkpoints/config/logs).
  # /u03 stays emptyDir for now. claimName is intentionally short: EFS CSI
  # appends a unique suffix to the access point path built from basePath +
  # this PVC name, and EFS enforces a 100-character path limit. The PVC is
  # namespaced (gg-dev-payments-ora-to-pg-001), so a short name is safe --
  # the deployment identity is already carried by the namespace and by
  # persistence.efs.storageClass.basePath below, not by the PVC name.
  storage:
    u02:
      type: efs
      existingClaim: ""
      claimName: src-u02
      size: 20Gi
      accessModes:
        - ReadWriteMany
    u03:
      type: emptyDir

  readinessProbe:
    initialDelaySeconds: 180
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 20

  livenessProbe:
    initialDelaySeconds: 240
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 8

  resources: {}

  extraEnv: []
  extraVolumeMounts: []
  extraVolumes: []
  extraContainers: []

target:
  enabled: true
  name: ogg-postgresql
  component: target
  engine: postgresql
  replicas: 1
  containerName: ogg-postgresql

  image:
    repository: 229410149234.dkr.ecr.eu-west-1.amazonaws.com/ogg-postgresql
    tag: "23.26.2.0.1"
    pullPolicy: IfNotPresent

  ogg:
    deploymentName: PostgresqlTarget
    domain: ogg-postgresql.gg-dev-payments-ora-to-pg-001.svc.cluster.local
    secureDeployment: false

  admin:
    existingSecret: ogg-postgresql-admin
    usernameKey: OGG_ADMIN
    passwordKey: OGG_ADMIN_PWD

  csi:
    enabled: true
    region: eu-west-1
    serviceAccountRoleArn: arn:aws:iam::668311715351:role/GoldenGateSecretsReadRole-dev

    admin:
      # NOTE: dev/goldengate/target/admin is a shared POC secret reused across
      # all payments-ora-to-pg-* target deployments. Production should move to one
      # admin secret per deployment, e.g. dev/goldengate/target/payments-ora-to-pg-001/admin.
      enabled: true
      providerClassName: ogg-postgresql-admin
      secretName: ogg-postgresql-admin
      objectName: dev/goldengate/target/admin
      objectType: secretsmanager
      mountPath: /mnt/secrets-store/admin
      jmesPath:
        - path: OGG_ADMIN
          objectAlias: OGG_ADMIN
        - path: OGG_ADMIN_PWD
          objectAlias: OGG_ADMIN_PWD

    certificate:
      enabled: true
      providerClassName: ogg-postgresql-certificate
      objectName: dev/goldengate/tls-certificate
      objectType: secretsmanager
      mountPath: /etc/nginx/cert
      jmesPath:
        - path: '"ogg.key"'
          objectAlias: ogg.key
        - path: '"ogg.pem"'
          objectAlias: ogg.pem
        - path: '"ca-chain.pem"'
          objectAlias: ca-chain.pem

  initPermissions:
    enabled: true
    mode: "0777"

  serviceAccount:
    create: false
    name: ogg-oracle-sa
    annotations: {}

  service:
    type: ClusterIP
    ports:
      https: 8443
      receiver: 9014
      metrics: 9015

  # Phase 1: /u02 is EFS-backed (persistent trails/checkpoints/config/logs).
  # /u03 stays emptyDir for now. claimName is intentionally short (see the
  # matching comment under source.storage.u02) to stay under EFS's
  # 100-character access point path limit.
  storage:
    u02:
      type: efs
      existingClaim: ""
      claimName: tgt-u02
      size: 20Gi
      accessModes:
        - ReadWriteMany
    u03:
      type: emptyDir

  readinessProbe:
    initialDelaySeconds: 180
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 20

  livenessProbe:
    initialDelaySeconds: 240
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 8

  resources: {}

  extraEnv: []
  extraVolumeMounts: []
  extraVolumes: []
  extraContainers: []

ingress:
  enabled: true
  mode: shared
  className: alb

  hosts:
    source: ogg-oracle-payments-ora-to-pg-001.goldengate-dev.adcbmis.local
    target: ogg-postgresql-payments-ora-to-pg-001.goldengate-dev.adcbmis.local

  alb:
    groupName: gg-poc-dev-alb
    groupOrder: "110"
    backendProtocol: HTTPS
    listenPorts: '[{"HTTPS":443}]'
    certificateArn: arn:aws:acm:eu-west-1:668311715351:certificate/9e53e28e-3243-47fc-85a1-50f9a94acde7
    targetType: ip
    healthcheckProtocol: HTTPS
    healthcheckPort: traffic-port
    healthcheckPath: /
    successCodes: "200-499"

  annotations: {}

configJob:
  enabled: false

monitoring:
  labels:
    enabled: true

podSecurityContext: {}

securityContext:
  runAsUser: 0
  runAsGroup: 0
  allowPrivilegeEscalation: false

nodeSelector: {}

tolerations: []

affinity: {}

# EFS filesystem gg-poc-dev-efs already exists outside Helm -- only its ID is
# consumed here. EFS CSI dynamic provisioning creates per-PVC access points
# under basePath (see helm/goldengate/templates/efs-storageclass.yaml).
# basePath is short (/payments-ora-to-pg-001, not /goldengate/dev/...): EFS
# CSI appends a unique suffix to basePath + PVC name to build the access
# point root path, and EFS enforces a 100-character path limit -- the
# deployment is still uniquely identified by this basePath (and by the
# gg-dev-payments-ora-to-pg-001 namespace the PVCs live in), so the extra
# /goldengate/dev/ prefix was redundant, not identity-bearing.
# reclaimPolicy: Retain is intentional: GoldenGate storage holds trail/
# checkpoint/recovery state, so deleting this deployment (Application +
# namespace) must not automatically destroy EFS data/access points. EFS
# cleanup remains a separate, deliberate operation outside this workflow.
persistence:
  enabled: true
  provider: efs
  efs:
    fileSystemId: fs-05cadf3570f23cd39
    storageClass:
      create: true
      name: gg-efs-dev-payments-ora-to-pg-001
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      directoryPerms: "0777"
      basePath: /payments-ora-to-pg-001
      subPathPattern: "${.PVC.name}"
      ensureUniqueDirectory: "true"
      mountOptions:
        - tls
