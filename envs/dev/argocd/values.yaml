# Argo CD -- dev/test environment values
#
# Non-HA, single-replica install for the private EKS dev/test cluster.
# This cluster has no public internet access, so every runtime image
# referenced here must resolve to private ECR. The argocd-eks-deployment.yaml
# workflow enforces this by rendering the chart and scanning every image
# reference for public registries (quay.io, ghcr.io, docker.io,
# public.ecr.aws, registry.k8s.io, gcr.io, k8s.gcr.io) and for unresolved
# placeholder values before it will push/deploy anything.
#
# No Argo CD Applications, repo credentials, or SSO/OIDC secrets are
# configured here. This file only stands up the Argo CD platform itself.

argo-cd:
  global:
    image:
      repository: 229410149234.dkr.ecr.eu-west-1.amazonaws.com/aws-cloud-factory-infra-argocd
      tag: "3.2.12"
      imagePullPolicy: IfNotPresent

  crds:
    install: true
    keep: true

  createClusterRoles: true

  controller:
    replicas: 1

  server:
    replicas: 1
    service:
      type: ClusterIP

  repoServer:
    replicas: 1

  applicationSet:
    replicas: 1

  notifications:
    enabled: true

  # Dex (SSO/OIDC) stays disabled for now. The upstream chart's default Dex
  # image is ghcr.io/dexidp/dex -- a public registry this cluster cannot
  # reach. Before enabling Dex:
  #   1. Mirror the required Dex image to private ECR.
  #   2. Point dex.image.repository/tag at that private ECR image here.
  #   3. Only then set dex.enabled to true.
  dex:
    enabled: false

  # HA Redis (Sentinel-based, via the bundled redis-ha subchart) is not
  # needed for a single-replica dev/test install.
  redis-ha:
    enabled: false

  redis:
    enabled: true
    image:
      repository: 229410149234.dkr.ecr.eu-west-1.amazonaws.com/aws-cloud-factory-infra-redis-alpine
      tag: "8.2.3"
    # The bundled Redis metrics exporter defaults to the public image
    # ghcr.io/oliver006/redis_exporter. Leave it disabled until/unless that
    # image is also mirrored to private ECR.
    metrics:
      enabled: false

  configs:
    cm:
      admin.enabled: true
      timeout.reconciliation: 180s
    rbac:
      policy.default: "role:readonly"

# In-cluster CronJob that keeps the argocd-ecr-goldengate-oci repository
# Secret refreshed with a live ECR token, via IRSA -- the long-term
# replacement for GitHub Actions injecting a short-lived ECR password.
ecrTokenSync:
  enabled: true
  schedule: "0 */6 * * *"
  serviceAccountName: argocd-ecr-token-sync
  roleArn: arn:aws:iam::668311715351:role/GoldenGateArgocdECRRead-dev
  awsRegion: eu-west-1
  ecrRegistry: 229410149234.dkr.ecr.eu-west-1.amazonaws.com
  helmOciRepository: helm/goldengate
  argocdRepositorySecretName: argocd-ecr-goldengate-oci
  image:
    repository: 229410149234.dkr.ecr.eu-west-1.amazonaws.com/aws-cloud-factory-infra-aws-kubectl
    tag: "1.33.13"
    # Always (not IfNotPresent): this tag was just re-mirrored/replaced in
    # ECR, so nodes must not reuse a stale cached image under the same tag.
    pullPolicy: Always

# Exposes the Argo CD UI through the same shared internal ALB and wildcard
# DNS (*.goldengate-dev.adcbmis.local) as GoldenGate's own ingress
# (envs/dev/payments-ora-to-pg-*/values.yaml). listenPorts/certificateArn
# match that working ingress exactly: the resident ALB already terminates
# HTTPS on 443 with this ACM certificate, so a joining Ingress must declare
# the same listener and certificate rather than relying on per-Ingress
# host-based ACM discovery (see helm/goldengate/templates/ingress.yaml).
# certificateArn is the current valid ACM certificate, confirmed via AWS ACM
# -- the previous ARN (...0a2ab950-8d20-456c-b43f-a3987f7d1841) no longer
# resolves and caused CertificateNotFound when the ALB Controller tried to
# attach this Ingress.
argocdServerIngress:
  enabled: true
  ingressClassName: alb
  host: argocd.goldengate-dev.adcbmis.local
  serviceName: argocd-server
  servicePort: 443
  groupName: gg-poc-dev-alb
  groupOrder: "50"
  targetType: ip
  backendProtocol: HTTPS
  listenPorts: '[{"HTTPS":443}]'
  certificateArn: arn:aws:acm:eu-west-1:668311715351:certificate/9e53e28e-3243-47fc-85a1-50f9a94acde7
  healthcheckProtocol: HTTPS
  healthcheckPath: /healthz
  healthcheckPort: traffic-port
