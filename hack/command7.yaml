Yes broo, we can get most details from the existing certificate. For the new CSR, the important details are:

Subject / CN details from old certificate
Key type/size
New required SAN list

Issuer, expiry date, serial number, etc. are not part of the CSR. The CA/change team will set those when they issue the new certificate.

1. First extract details from existing cert

Use the .pem certificate file:

openssl x509 -in "goldengate-dev.adcbmis.local.pem" -noout -subject -issuer -dates -ext subjectAltName

Based on what we already saw, the subject is likely:

C  = AE
ST = Abu Dhabi
L  = Abu Dhabi
O  = ADCB
OU = IT
CN = goldengate-dev.adcbmis.local

Current SAN is only:

DNS:goldengate-dev.adcbmis.local

New SAN should be:

DNS:goldengate-dev.adcbmis.local
DNS:*.goldengate-dev.adcbmis.local
2. Check if the existing key matches the certificate

Broo, this file:

ca-key.pem

looks like a private key. Do not share it with anyone in email/chat.

To check whether that key matches the certificate, run:

openssl x509 -in "goldengate-dev.adcbmis.local.pem" -noout -modulus | openssl md5
openssl rsa -in "ca-key.pem" -noout -modulus | openssl md5

If both MD5 values are the same, then ca-key.pem is the matching private key for that certificate.

If it asks for passphrase, enter the key password if you have one.

3. Create CSR using existing key

If the key matches and your team is okay to reuse the same private key, create this config file:

cat > goldengate-dev-wildcard.cnf <<'EOF'
[ req ]
default_bits       = 2048
prompt             = no
default_md         = sha256
distinguished_name = dn
req_extensions     = req_ext

[ dn ]
C  = AE
ST = Abu Dhabi
L  = Abu Dhabi
O  = ADCB
OU = IT
CN = goldengate-dev.adcbmis.local

[ req_ext ]
subjectAltName = @alt_names

[ alt_names ]
DNS.1 = goldengate-dev.adcbmis.local
DNS.2 = *.goldengate-dev.adcbmis.local
EOF

Then generate CSR:

openssl req -new \
  -key "ca-key.pem" \
  -out "goldengate-dev-wildcard.csr" \
  -config "goldengate-dev-wildcard.cnf"

Verify CSR:

openssl req -in "goldengate-dev-wildcard.csr" -noout -subject -text | grep -A5 "Subject Alternative Name"

Expected:

DNS:goldengate-dev.adcbmis.local, DNS:*.goldengate-dev.adcbmis.local
4. What to share with network/change team

Send only this file:

goldengate-dev-wildcard.csr

Do not send:

ca-key.pem

In the email/message, mention:

Required SANs:
DNS:goldengate-dev.adcbmis.local
DNS:*.goldengate-dev.adcbmis.local
5. If they prefer a new private key

Then generate a new key and CSR like this:

openssl genrsa -out "goldengate-dev-wildcard.key" 2048

openssl req -new \
  -key "goldengate-dev-wildcard.key" \
  -out "goldengate-dev-wildcard.csr" \
  -config "goldengate-dev-wildcard.cnf"

In that case, keep this private key securely:

goldengate-dev-wildcard.key

The issued certificate will only work with that new key.

Recommended for you now

Since you already have the previous key/cert bundle, first try the matching check:

openssl x509 -in "goldengate-dev.adcbmis.local.pem" -noout -modulus | openssl md5
openssl rsa -in "ca-key.pem" -noout -modulus | openssl md5

If both values match, generate the CSR using the existing key. Then share only the .csr file with Salma/change team.