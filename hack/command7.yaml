Yes broo, Git Bash with OpenSSL is enough. Do this from the folder where those files are saved.

1. Open Git Bash in that folder

Right-click inside the folder and choose Git Bash Here.

Then run:

ls -la

You should see the real file names/extensions. Most likely:

goldengate-dev.adcbmis.local.cer
goldengate-dev.adcbmis.local.p7b
goldengate-dev.key
goldengate-dev-wildcard.csr

For ACM, we do not need the CSR now.

2. Set file names

Update these names based on your ls -la output:

CERT_FILE="goldengate-dev.adcbmis.local.cer"
P7B_FILE="goldengate-dev.adcbmis.local.p7b"
KEY_FILE="goldengate-dev.key"

mkdir -p acm-import
3. Convert server certificate to PEM

Run:

openssl x509 -in "$CERT_FILE" -out acm-import/server-cert.pem -outform PEM || \
openssl x509 -inform DER -in "$CERT_FILE" -out acm-import/server-cert.pem -outform PEM

Verify wildcard SAN:

openssl x509 -in acm-import/server-cert.pem -noout -subject -issuer -dates -ext subjectAltName

You must see:

DNS:goldengate-dev.adcbmis.local
DNS:*.goldengate-dev.adcbmis.local

This file goes to AWS field:

Certificate body
4. Prepare private key for ACM

Run:

openssl pkey -in "$KEY_FILE" -out acm-import/private-key.pem

If it asks for a password, enter the key password. This creates a PEM private key format accepted by ACM.

This file goes to AWS field:

Certificate private key

Do not share this file with anyone.

5. Verify certificate and key match

Run both commands:

openssl x509 -in acm-import/server-cert.pem -pubkey -noout | openssl pkey -pubin -outform DER | openssl dgst -sha256
openssl pkey -in acm-import/private-key.pem -pubout -outform DER | openssl dgst -sha256

Both SHA256 values must be the same. If they are different, stop broo — wrong key/certificate pair.

6. Extract certificate chain from PKCS#7 file

Run:

openssl pkcs7 -print_certs -in "$P7B_FILE" -out acm-import/all-certs-from-p7b.pem || \
openssl pkcs7 -inform DER -print_certs -in "$P7B_FILE" -out acm-import/all-certs-from-p7b.pem

Now split the certificates:

awk 'BEGIN{n=0; file=""} /-----BEGIN CERTIFICATE-----/{n++; file=sprintf("acm-import/cert-%02d.pem",n)} file!=""{print > file} /-----END CERTIFICATE-----/{file=""}' acm-import/all-certs-from-p7b.pem

List what each cert is:

for f in acm-import/cert-*.pem; do
  echo "===== $f ====="
  openssl x509 -in "$f" -noout -subject -issuer
done

You will see one certificate with subject like:

CN=goldengate-dev.adcbmis.local

That is the server certificate. Do not include that in the chain.

The remaining certificates are usually:

Intermediate CA certificate
Root CA certificate

Create the chain with intermediate first, root second. Example only:

cat acm-import/cert-02.pem acm-import/cert-03.pem > acm-import/certificate-chain.pem

This file goes to AWS field:

Certificate chain
7. Paste into ACM

In AWS ACM reimport screen:

Certificate body        = content of acm-import/server-cert.pem
Certificate private key = content of acm-import/private-key.pem
Certificate chain       = content of acm-import/certificate-chain.pem

To copy each one easily from Git Bash:

cat acm-import/server-cert.pem | clip

Paste into Certificate body.

cat acm-import/private-key.pem | clip

Paste into Certificate private key.

cat acm-import/certificate-chain.pem | clip

Paste into Certificate chain.

Then click Reimport certificate.

Broo, before clicking reimport, the most important checks are: SAN has wildcard, and cert/key SHA256 values match.