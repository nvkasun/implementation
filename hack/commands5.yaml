Use this full command:

NS=gg-dev-payments-ora-to-pg-003
IMAGE="229410149234.dkr.ecr.eu-west-1.amazonaws.com/tools-curl:8.8.0"

ALB_DNS="internal-k8s-ggpocdevalb-53c8cf7cb4-847733536.eu-west-1.elb.amazonaws.com"

SOURCE_HOST="ogg-oracle-payments-ora-to-pg-003.gg-dev.local"
TARGET_HOST="ogg-postgresql-payments-ora-to-pg-003.gg-dev.local"

kubectl run alb-curl-test -n $NS --rm -i --restart=Never \
  --image=$IMAGE \
  --image-pull-policy=IfNotPresent \
  --command -- sh -c "
    echo 'Testing source GoldenGate through ALB...'
    curl -kvI --connect-to ${SOURCE_HOST}:443:${ALB_DNS}:443 https://${SOURCE_HOST}/ || true

    echo ''
    echo 'Testing target GoldenGate through ALB...'
    curl -kvI --connect-to ${TARGET_HOST}:443:${ALB_DNS}:443 https://${TARGET_HOST}/ || true
  "

Acceptable result is any HTTP response like:

HTTP/1.1 200
HTTP/1.1 302
HTTP/1.1 401
HTTP/1.1 403

That means:

Pod → internal ALB → host rule → GoldenGate service → GoldenGate pod

is working.

Also test HTTP to HTTPS redirect:

NS=gg-dev-payments-ora-to-pg-003
IMAGE="229410149234.dkr.ecr.eu-west-1.amazonaws.com/tools-curl:8.8.0"

ALB_DNS="internal-k8s-ggpocdevalb-53c8cf7cb4-847733536.eu-west-1.elb.amazonaws.com"

SOURCE_HOST="ogg-oracle-payments-ora-to-pg-003.gg-dev.local"
TARGET_HOST="ogg-postgresql-payments-ora-to-pg-003.gg-dev.local"

kubectl run alb-curl-http-test -n $NS --rm -i --restart=Never \
  --image=$IMAGE \
  --image-pull-policy=IfNotPresent \
  --command -- sh -c "
    echo 'Testing source HTTP redirect...'
    curl -vI --connect-to ${SOURCE_HOST}:80:${ALB_DNS}:80 http://${SOURCE_HOST}/ || true

    echo ''
    echo 'Testing target HTTP redirect...'
    curl -vI --connect-to ${TARGET_HOST}:80:${ALB_DNS}:80 http://${TARGET_HOST}/ || true
  "

Expected redirect:

HTTP/1.1 301
HTTP/1.1 302
Location: https://...

If the pod still cannot pull the image, run this to confirm the exact repo/tag:

aws ecr describe-images \
  --region eu-west-1 \
  --repository-name tools-curl \
  --image-ids imageTag=8.8.0

But yes broo, using the private tools-curl:8.8.0 image is the correct solution here.