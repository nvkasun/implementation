Run this from the EC2 terminal
ALB_DNS="internal-k8s-ggpocdevalb-53c8cf7cb4-847733536.eu-west-1.elb.amazonaws.com"

SOURCE_HOST="ogg-oracle-payments-ora-to-pg-003.gg-dev.local"
TARGET_HOST="ogg-postgresql-payments-ora-to-pg-003.gg-dev.local"

First check ALB DNS resolves:

nslookup $ALB_DNS

Then test source GoldenGate through ALB:

curl -kvI --connect-to ${SOURCE_HOST}:443:${ALB_DNS}:443 https://${SOURCE_HOST}/

Then test target GoldenGate through ALB:

curl -kvI --connect-to ${TARGET_HOST}:443:${ALB_DNS}:443 https://${TARGET_HOST}/

Acceptable responses:

HTTP/1.1 200
HTTP/1.1 302
HTTP/1.1 401
HTTP/1.1 403

Any of those means this path is working:

EC2 → Internal ALB → Ingress host rule → service → GoldenGate pod
Test HTTP redirect also
curl -vI --connect-to ${SOURCE_HOST}:80:${ALB_DNS}:80 http://${SOURCE_HOST}/
curl -vI --connect-to ${TARGET_HOST}:80:${ALB_DNS}:80 http://${TARGET_HOST}/

Expected:

HTTP/1.1 301
HTTP/1.1 302
Location: https://...
Important note

Do not test like this:

curl -k https://internal-k8s-ggpocdevalb-53c8cf7cb4-847733536.eu-west-1.elb.amazonaws.com

That may not hit the correct host rule, because ALB routing depends on the hostname:

ogg-oracle-payments-ora-to-pg-003.gg-dev.local
ogg-postgresql-payments-ora-to-pg-003.gg-dev.local

So use --connect-to.

If it times out

That means network/security group issue:

EC2 security group / subnet route / ALB security group does not allow EC2 → ALB 443
If you get 404

That usually means ALB is reachable, but host rule did not match. Then we check hostname spelling.

If you get 502/503

That means ALB reached the listener, but backend target/service health has an issue.

Run the two curl --connect-to commands from EC2 and share the output broo.