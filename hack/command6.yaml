So use the DER command only, not the normal PEM command.

Run this exactly:

openssl pkcs7 -inform DER -in "$P7B_FILE" -print_certs -out acm-import/all-certs-from-p7b.pem

Then confirm it created the file:

ls -la acm-import/all-certs-from-p7b.pem
head -20 acm-import/all-certs-from-p7b.pem

You should see:

-----BEGIN CERTIFICATE-----
...
-----END CERTIFICATE-----
If that command still fails

Try this alternative:

openssl cms -inform DER -in "$P7B_FILE" -cmsout -print > acm-import/p7b-debug.txt

Then try:

openssl cms -inform DER -in "$P7B_FILE" -verify -noverify -certsout acm-import/all-certs-from-p7b.pem -out /dev/null
After extraction, split the certificates
awk 'BEGIN{n=0; file=""} /-----BEGIN CERTIFICATE-----/{n++; file=sprintf("acm-import/cert-%02d.pem",n)} file!=""{print > file} /-----END CERTIFICATE-----/{file=""}' acm-import/all-certs-from-p7b.pem

Now inspect them:

for f in acm-import/cert-*.pem; do
  echo "===== $f ====="
  openssl x509 -in "$f" -noout -subject -issuer
done

You will see something like:

cert-01.pem = goldengate-dev.adcbmis.local       ← server cert, do NOT use in chain
cert-02.pem = ADCB SUBCA01                       ← intermediate CA, use in chain
cert-03.pem = ADCB Root CA / AdcbMis local        ← root CA, use in chain if available
Create the ACM certificate chain

Use only CA certs, not the GoldenGate server certificate.

Example, if cert-02.pem is intermediate and cert-03.pem is root:

cat acm-import/cert-02.pem acm-import/cert-03.pem > acm-import/certificate-chain.pem

If the .p7b only contains one CA certificate after the server cert, then use only that:

cat acm-import/cert-02.pem > acm-import/certificate-chain.pem
Final ACM paste mapping

You already confirmed these two are good:

Certificate body:
acm-import/server-cert.pem

Certificate private key:
acm-import/private-key.pem

Now the final one will be:

Certificate chain:
acm-import/certificate-chain.pem

To copy each one from Git Bash:

cat acm-import/server-cert.pem | clip

Paste into Certificate body.

cat acm-import/private-key.pem | clip

Paste into Certificate private key.

cat acm-import/certificate-chain.pem | clip

Paste into Certificate chain.

Then click Reimport certificate.