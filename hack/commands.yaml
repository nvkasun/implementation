GoldenGate EKS POC Update
What we have completed so far
Reviewed the current GoldenGate deployment architecture and aligned the EKS implementation with the expected source/target pod model.
Deployed the GoldenGate source and target pods for the current POC deployment.
Confirmed both source and target pods are running successfully in EKS.
Configured the internal ALB and Ingress routing for GoldenGate access.
Validated that traffic is reaching the GoldenGate backend services through the internal ALB.
Identified an issue with the existing SSL certificate, where it only supported one DNS name and did not support wildcard hostnames.
Requested and received a new wildcard SSL certificate to support deployment-based hostnames.
Prepared the certificate files required for ACM update and shared them with CloudOps.
Created new Secrets Manager entries using a cleaner naming structure:
dev/goldengate/source/admin
dev/goldengate/target/admin
dev/goldengate/tls-certificate
Updated the Helm values and templates to use the new secret names.
Updated the planned GoldenGate hostnames to use the new wildcard certificate domain.
Reviewed and fixed a few Helm/GitHub Actions issues before the next deployment.
Rendered and validated the Helm manifests to confirm the new secret names, certificate mappings, and hostnames are correctly reflected.
Current status
The GoldenGate EKS deployment is ready from the application/Helm side.
The new wildcard certificate has been prepared and shared with CloudOps.
Waiting for CloudOps to update the existing ACM certificate.
Once the ACM update is completed, we can redeploy and validate the final access flow.
Remaining items
CloudOps to update/reimport the new wildcard certificate in ACM.
Validate that the internal ALB is serving the updated wildcard certificate.
Run the updated GitHub Actions deployment.
Validate that the new Secrets Manager entries are correctly mounted into the pods.
Confirm source and target GoldenGate endpoints are reachable using the final hostnames.
Request the Network/Route53 team to create the wildcard private DNS record:
*.goldengate-dev.adcbmis.local
→ internal ALB DNS name
After DNS is created, validate browser access from the internal network.
Then continue with the actual GoldenGate replication configuration, including Extract, Distribution, Receiver, and Replicat setup.
Notes
The Terraform secret changes need to be handled carefully because the new secrets were created manually. We should not run Terraform apply directly until the state/import approach is confirmed.
If CloudOps updates the existing ACM certificate, the ALB certificate ARN should remain the same. If they create a new ACM certificate instead, we will need to update the Helm Ingress annotation with the new ARN.