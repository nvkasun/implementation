1. Set variables

Use this exactly:

NS=gg-dev-csi-test
SA=ogg-oracle-sa
ROLE_ARN="arn:aws:iam::668311715351:role/GoldenGateSecretsReadRole-dev"
SECRET_ARN="arn:aws:secretsmanager:eu-west-1:668311715351:secret:dev/goldengate/certificate-k3ChjX"
2. Create / annotate service account
kubectl create serviceaccount ${SA} -n ${NS} \
  --dry-run=client -o yaml | kubectl apply -f -

kubectl annotate serviceaccount ${SA} -n ${NS} \
  eks.amazonaws.com/role-arn="${ROLE_ARN}" \
  --overwrite

kubectl get sa ${SA} -n ${NS} -o yaml

Confirm this appears:

eks.amazonaws.com/role-arn: arn:aws:iam::668311715351:role/GoldenGateSecretsReadRole-dev
3. Create SecretProviderClass
cat <<EOF | kubectl apply -f -
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aws-goldengate-certificate-test
  namespace: ${NS}
spec:
  provider: aws
  parameters:
    region: eu-west-1
    objects: |
      - objectName: "${SECRET_ARN}"
        objectType: "secretsmanager"
        objectAlias: "certificate.json"
EOF
4. Create test pod

This will not print the secret value, only filename and file size.

cat <<EOF | kubectl apply -f -
apiVersion: v1
kind: Pod
metadata:
  name: csi-secret-test
  namespace: ${NS}
spec:
  serviceAccountName: ${SA}
  restartPolicy: Never
  containers:
    - name: test
      image: public.ecr.aws/docker/library/busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Checking mounted secret files..."
          ls -la /mnt/secrets-store

          echo "Secret file size:"
          wc -c /mnt/secrets-store/certificate.json

          echo "Keeping pod alive for inspection..."
          sleep 3600
      volumeMounts:
        - name: secrets-store-inline
          mountPath: /mnt/secrets-store
          readOnly: true
  volumes:
    - name: secrets-store-inline
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: aws-goldengate-certificate-test
EOF
5. Check result
kubectl get pod csi-secret-test -n ${NS}
kubectl describe pod csi-secret-test -n ${NS}
kubectl logs csi-secret-test -n ${NS}

Expected log:

Checking mounted secret files...
certificate.json
Secret file size:
<number> /mnt/secrets-store/certificate.json

Also check CSI status:

kubectl get secretproviderclasspodstatus -n ${NS}
kubectl describe secretproviderclasspodstatus -n ${NS}