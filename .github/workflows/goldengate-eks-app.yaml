name: Goldengate EKS app deployment

run-name: "Cloud Factory - GoldenGate Helm build and deploy | ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_id || format('auto: envs/dev changes on {0}', github.sha) }} | ran by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        default: dev
        options:
          - dev

      deployment_id:
        description: "Unique GoldenGate deployment ID, example: payments-ora-to-pg-001"
        required: true
        type: string
        default: payments-ora-to-pg-001

      deploy:
        description: "Deploy to EKS after publishing Helm chart"
        required: true
        type: boolean
        default: true

  push:
    branches:
      - main
    paths:
      - 'envs/dev/**'
      - 'helm/goldengate/**'
      - 'monitoring/observer/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

  # ECR / runner account where Helm OCI chart will be pushed.
  ECR_ACCOUNT_ID: "229410149234"
  ECR_REGISTRY: 229410149234.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

  # Role used by GitHub Actions / CodeBuild runner.
  ROLE_ARN: ${{ vars.GOLDENGATE_AWS_ROLE_ARN }}

  # Target EKS cluster details.
  EKS_ACCOUNT_ID: ${{ vars.ACCOUNT_ID_DEV }}
  EKS_CLUSTER_NAME: ${{ vars.AWS_CLUSTER_NAME }}
  EKS_CLUSTER_ARN: ${{ vars.AWS_CLUSTER_ARN }}

  # Optional. Add this repo variable later only if cross-account EKS auth fails.
  EKS_DEPLOY_ROLE_ARN: ${{ vars.EKS_DEPLOY_ROLE_ARN }}

  # IRSA role the in-cluster argocd-ecr-token-sync CronJob assumes to pull
  # the GoldenGate Helm OCI chart. The helm/goldengate ECR repository policy
  # must grant this exact role pull access -- see the "Ensure Helm ECR
  # repository policy allows Argo CD pull" step below.
  ARGOCD_ECR_READ_ROLE_ARN: arn:aws:iam::668311715351:role/GoldenGateArgocdECRRead-dev

  HELM_OCI_NAMESPACE: helm
  CHART_NAME: goldengate
  HELM_CHART_PATH: helm/goldengate
  ENVS_ROOT: envs

  # GoldenGate monitoring observer: built once per observer-content Git tree
  # SHA (see ensure_observer_image), independent of the per-deployment Helm
  # matrix below.
  OBSERVER_SOURCE_PATH: monitoring/observer
  OBSERVER_ECR_REPOSITORY: goldengate-observer

jobs:
  detect_changed_deployments:
    name: Detect changed GoldenGate deployments

    runs-on: codebuild-${{ vars.PROJECT_NAME_DEV }}-${{ github.run_id }}-${{ github.run_attempt }}

    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      deployment_matrix: ${{ steps.detect.outputs.deployment_matrix }}
      has_deletions: ${{ steps.detect.outputs.has_deletions }}
      deletion_matrix: ${{ steps.detect.outputs.deletion_matrix }}
      observer_changed: ${{ steps.detect.outputs.observer_changed }}
      observer_tree_sha: ${{ steps.detect.outputs.observer_tree_sha }}
      observer_image_tag: ${{ steps.detect.outputs.observer_image_tag }}
      observer_image_repository: ${{ steps.detect.outputs.observer_image_repository }}
      observer_image_uri: ${{ steps.detect.outputs.observer_image_uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed deployments
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # Returns 0 (active) or 1 (inactive) on stdout as a one-line
          # reason, for a given envs/dev/<id>/values.yaml path. A deployment
          # is inactive if: the file is missing, empty, comment-only, parses
          # to null/empty YAML, or explicitly disables itself via
          # enabled: false, deployment.enabled: false, or
          # lifecycle.state: absent. Prefers PyYAML (safe, full parse) and
          # falls back to conservative text patterns only if PyYAML isn't
          # installed on the runner -- never installs anything.
          is_active_deployment_values_file() {
            local values_file="$1"

            if [ ! -f "$values_file" ]; then
              echo "missing values.yaml"
              return 1
            fi

            if [ ! -s "$values_file" ]; then
              echo "empty values.yaml"
              return 1
            fi

            if command -v python3 >/dev/null 2>&1; then
              python3 - "$values_file" <<'PYEOF'
          import re
          import sys

          path = sys.argv[1]

          with open(path, "r") as f:
              raw = f.read()

          non_comment_lines = [
              line for line in raw.splitlines()
              if line.strip() and not line.strip().startswith("#")
          ]
          if not non_comment_lines:
              print("empty/comment-only values.yaml")
              sys.exit(1)

          try:
              import yaml
          except ImportError:
              # Conservative fallback without PyYAML: only recognizes the three
              # documented disable-flag shapes, not arbitrary YAML nesting.
              if re.search(r'(?m)^\s*enabled\s*:\s*false\s*$', raw):
                  print("enabled=false (text fallback, PyYAML unavailable)")
                  sys.exit(1)
              if re.search(r'(?ms)^deployment\s*:\s*\n(?:[ \t]+\S.*\n?)*?[ \t]+enabled\s*:\s*false\s*$', raw):
                  print("deployment.enabled=false (text fallback, PyYAML unavailable)")
                  sys.exit(1)
              if re.search(r'(?ms)^lifecycle\s*:\s*\n(?:[ \t]+\S.*\n?)*?[ \t]+state\s*:\s*["\']?absent["\']?\s*$', raw):
                  print("lifecycle.state=absent (text fallback, PyYAML unavailable)")
                  sys.exit(1)
              print("active (text fallback, PyYAML unavailable)")
              sys.exit(0)

          try:
              data = yaml.safe_load(raw)
          except yaml.YAMLError as exc:
              print(f"unparsable YAML: {exc}")
              sys.exit(1)

          if not data:
              print("empty/null parsed YAML")
              sys.exit(1)

          if not isinstance(data, dict):
              print("parsed YAML is not a mapping")
              sys.exit(1)

          if data.get("enabled") is False:
              print("enabled=false")
              sys.exit(1)

          deployment = data.get("deployment")
          if isinstance(deployment, dict) and deployment.get("enabled") is False:
              print("deployment.enabled=false")
              sys.exit(1)

          lifecycle = data.get("lifecycle")
          if isinstance(lifecycle, dict) and lifecycle.get("state") == "absent":
              print("lifecycle.state=absent")
              sys.exit(1)

          print("active")
          sys.exit(0)
          PYEOF
              return $?
            fi

            echo "python3 not available on this runner, using conservative bash fallback"

            local non_comment
            non_comment="$(grep -vE '^[[:space:]]*(#.*)?$' "$values_file" || true)"
            if [ -z "$non_comment" ]; then
              echo "empty/comment-only values.yaml (bash fallback)"
              return 1
            fi

            if grep -Eq '^enabled[[:space:]]*:[[:space:]]*false[[:space:]]*$' "$values_file"; then
              echo "enabled=false (bash fallback)"
              return 1
            fi

            if awk '
              /^deployment:[[:space:]]*$/ { in_block=1; next }
              in_block && /^[[:space:]]+enabled:[[:space:]]*false[[:space:]]*$/ { found=1; exit }
              in_block && /^[^[:space:]]/ { in_block=0 }
              END { exit !found }
            ' "$values_file"; then
              echo "deployment.enabled=false (bash fallback)"
              return 1
            fi

            if awk '
              /^lifecycle:[[:space:]]*$/ { in_block=1; next }
              in_block && /^[[:space:]]+state:[[:space:]]*"?absent"?[[:space:]]*$/ { found=1; exit }
              in_block && /^[^[:space:]]/ { in_block=0 }
              END { exit !found }
            ' "$values_file"; then
              echo "lifecycle.state=absent (bash fallback)"
              return 1
            fi

            echo "active (bash fallback, python3 unavailable)"
            return 0
          }

          # Observer content-addressed image tag: calculated on every trigger
          # (push and workflow_dispatch) from the Git tree SHA of
          # monitoring/observer alone, NOT the overall commit SHA -- a
          # deployment-values-only or Helm-only change changes github.sha but
          # never changes this tree SHA, so the observer image tag (and the
          # existing ECR image, once built) stays stable across those changes.
          echo "Calculating observer content-addressed image tag from ${OBSERVER_SOURCE_PATH}..."

          OBSERVER_TREE_SHA="$(git rev-parse "HEAD:${OBSERVER_SOURCE_PATH}")"
          OBSERVER_IMAGE_TAG="obs-${OBSERVER_TREE_SHA:0:12}"

          # OBSERVER_ECR_REPOSITORY (short name, e.g. "goldengate-observer")
          # stays reserved for AWS CLI operations against ECR. Docker, Helm
          # (monitoring.observer.image.repository), and the Argo CD Helm
          # parameter all need the FULL registry/repository URI -- without
          # it, the Helm template renders an incomplete image reference
          # (e.g. "goldengate-observer:obs-xxxx" instead of
          # "229410149234.dkr.ecr.eu-west-1.amazonaws.com/goldengate-observer:obs-xxxx").
          OBSERVER_IMAGE_REPOSITORY="${ECR_REGISTRY}/${OBSERVER_ECR_REPOSITORY}"
          OBSERVER_IMAGE_URI="${OBSERVER_IMAGE_REPOSITORY}:${OBSERVER_IMAGE_TAG}"

          echo "Observer tree SHA (monitoring/observer): ${OBSERVER_TREE_SHA}"
          echo "Observer image tag: ${OBSERVER_IMAGE_TAG}"
          echo "Observer ECR repository (short name, for AWS CLI): ${OBSERVER_ECR_REPOSITORY}"
          echo "Observer image repository (full URI, for Docker/Helm/Argo CD): ${OBSERVER_IMAGE_REPOSITORY}"
          echo "Observer image URI: ${OBSERVER_IMAGE_URI}"

          echo "observer_tree_sha=${OBSERVER_TREE_SHA}" >> "$GITHUB_OUTPUT"
          echo "observer_image_tag=${OBSERVER_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "observer_image_repository=${OBSERVER_IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "observer_image_uri=${OBSERVER_IMAGE_URI}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENVIRONMENT="${{ inputs.environment }}"
            DEPLOYMENT_ID="${{ inputs.deployment_id }}"
            DEPLOY="${{ inputs.deploy }}"
            VALUES_FILE="envs/${ENVIRONMENT}/${DEPLOYMENT_ID}/values.yaml"

            echo "Manual workflow_dispatch trigger for deployment_id=${DEPLOYMENT_ID}, environment=${ENVIRONMENT}."
            echo "Validating deployment values file: ${VALUES_FILE}"

            set +e
            REASON="$(is_active_deployment_values_file "$VALUES_FILE")"
            STATUS=$?
            set -e

            if [ "$STATUS" -ne 0 ]; then
              echo "Deployment values file check failed: ${REASON}"
              echo ""
              echo "Deployment values file is missing or inactive. Use Git deletion/disable flow for cleanup, or restore active values before manual deploy."
              exit 1
            fi

            echo "Deployment values file is active (${REASON}). Building single-item matrix."

            MATRIX_JSON="$(jq -nc \
              --arg environment "$ENVIRONMENT" \
              --arg deployment_id "$DEPLOYMENT_ID" \
              --argjson deploy "$DEPLOY" \
              '[{environment: $environment, deployment_id: $deployment_id, deploy: $deploy}]')"

            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "deployment_matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"
            echo "has_deletions=false" >> "$GITHUB_OUTPUT"
            echo "deletion_matrix=[]" >> "$GITHUB_OUTPUT"

            # Manual dispatch has no "before" commit to diff against, and
            # always targets exactly the requested deployment_id regardless
            # of this flag -- ensure_observer_image still runs unconditionally
            # below and only builds when the content-addressed tag is absent
            # from ECR.
            echo "observer_changed=false" >> "$GITHUB_OUTPUT"

            echo "Matrix: ${MATRIX_JSON}"
            exit 0
          fi

          echo "Push trigger. Detecting changed deployment folders under envs/dev/, helm/goldengate/, and ${OBSERVER_SOURCE_PATH}/..."

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          EMPTY_TREE_SHA="4b825dc642cb6eb9a060e54bf8d69288fbee4904"

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No usable previous commit (new branch or first push). Diffing against the empty tree."
            BEFORE_SHA="$EMPTY_TREE_SHA"
          fi

          CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- 'envs/dev/**' 'helm/goldengate/**' "${OBSERVER_SOURCE_PATH}/**" || true)"

          echo "Changed files under envs/dev/, helm/goldengate/, and ${OBSERVER_SOURCE_PATH}/:"
          echo "${CHANGED_FILES:-<none>}"

          CHART_CHANGED="false"
          if echo "$CHANGED_FILES" | grep -q '^helm/goldengate/'; then
            CHART_CHANGED="true"
          fi

          OBSERVER_CHANGED="false"
          if echo "$CHANGED_FILES" | grep -q "^${OBSERVER_SOURCE_PATH}/"; then
            OBSERVER_CHANGED="true"
          fi

          echo "Chart changed: ${CHART_CHANGED}"
          echo "Observer changed: ${OBSERVER_CHANGED}"
          echo "observer_changed=${OBSERVER_CHANGED}" >> "$GITHUB_OUTPUT"

          DEPLOYMENT_MATRIX_ITEMS="[]"
          DELETION_MATRIX_ITEMS="[]"
          ACTIVE_LOG=""
          INACTIVE_LOG=""

          # envs/dev/argocd/ holds Argo CD's own values file, deployed by the
          # separate argocd-eks-deployment.yaml workflow. It is never a
          # GoldenGate deployment and must be excluded here.
          #
          # Selection reason: a shared Helm chart change OR an observer
          # source change both affect every active deployment (the chart
          # renders the observer sidecar the same way for all of them), so
          # either one selects all active deployments. A deployment-values-
          # only change only affects its own folder.
          if [ "$CHART_CHANGED" = "true" ] || [ "$OBSERVER_CHANGED" = "true" ]; then
            if [ "$CHART_CHANGED" = "true" ] && [ "$OBSERVER_CHANGED" = "true" ]; then
              echo "Selection reason: shared GoldenGate Helm chart AND observer source both changed. Selecting all active dev deployments."
            elif [ "$CHART_CHANGED" = "true" ]; then
              echo "Selection reason: shared GoldenGate Helm chart changed. Selecting all active dev deployments."
            else
              echo "Selection reason: observer source (${OBSERVER_SOURCE_PATH}/) changed. Selecting all active dev deployments."
            fi

            DEPLOYMENT_CANDIDATE_IDS="$(find envs/dev -mindepth 2 -maxdepth 2 -name values.yaml -not -path 'envs/dev/argocd/*' \
              | sed -E 's#^envs/dev/([^/]+)/values\.yaml$#\1#' \
              | sort -u || true)"
          else
            echo "Selection reason: only envs/dev/<deployment> changed. Selecting changed deployment folders."

            DEPLOYMENT_CANDIDATE_IDS="$(echo "$CHANGED_FILES" \
              | grep -E '^envs/dev/[^/]+/' \
              | grep -v '^envs/dev/argocd/' \
              | sed -E 's#^envs/dev/([^/]+)/.*#\1#' \
              | sort -u || true)"
          fi

          for DEPLOYMENT_ID in $DEPLOYMENT_CANDIDATE_IDS; do
            VALUES_FILE="envs/dev/${DEPLOYMENT_ID}/values.yaml"

            set +e
            REASON="$(is_active_deployment_values_file "$VALUES_FILE")"
            STATUS=$?
            set -e

            if [ "$STATUS" -eq 0 ]; then
              echo "Active: ${DEPLOYMENT_ID} (${REASON})"
              ACTIVE_LOG="${ACTIVE_LOG}  - ${DEPLOYMENT_ID} (${REASON})\n"
              DEPLOYMENT_MATRIX_ITEMS="$(echo "$DEPLOYMENT_MATRIX_ITEMS" | jq -c \
                --arg deployment_id "$DEPLOYMENT_ID" \
                '. + [{environment: "dev", deployment_id: $deployment_id, deploy: true}]')"
            else
              echo "Not active: ${DEPLOYMENT_ID} (${REASON}) -- skipping build/update for this candidate."
            fi
          done

          echo ""
          echo "Detecting deleted or newly-inactive deployment folders under envs/dev/..."

          NAME_STATUS="$(git diff --name-status "$BEFORE_SHA" "$AFTER_SHA" -- 'envs/dev/**' 'helm/goldengate/**' || true)"

          echo "Name-status diff under envs/dev/ and helm/goldengate/:"
          echo "${NAME_STATUS:-<none>}"

          # A path is a deletion candidate when it was removed (D) or is the
          # old side of a rename (R). Only envs/dev/<id>/ paths matter here;
          # helm/goldengate/** changes never produce a deployment deletion.
          REMOVED_PATH_IDS="$(echo "$NAME_STATUS" \
            | awk '$1 ~ /^D/ { print $2 } $1 ~ /^R/ { print $2 }' \
            | grep -E '^envs/dev/[^/]+/' \
            | grep -v '^envs/dev/argocd/' \
            | sed -E 's#^envs/dev/([^/]+)/.*#\1#' \
            | sort -u || true)"

          # Deployments whose values.yaml itself changed (added/modified) in
          # this push must be re-checked too: the file can still exist but
          # have just become comment-only/empty/disabled.
          CHANGED_VALUES_IDS="$(echo "$CHANGED_FILES" \
            | grep -E '^envs/dev/[^/]+/values\.yaml$' \
            | grep -v '^envs/dev/argocd/' \
            | sed -E 's#^envs/dev/([^/]+)/values\.yaml$#\1#' \
            | sort -u || true)"

          DELETION_CANDIDATE_IDS="$(printf '%s\n%s\n' "$REMOVED_PATH_IDS" "$CHANGED_VALUES_IDS" | sed '/^$/d' | sort -u || true)"

          for CANDIDATE_ID in $DELETION_CANDIDATE_IDS; do
            VALUES_FILE="envs/dev/${CANDIDATE_ID}/values.yaml"

            set +e
            REASON="$(is_active_deployment_values_file "$VALUES_FILE")"
            STATUS=$?
            set -e

            if [ "$STATUS" -ne 0 ]; then
              echo "Inactive/deleted: ${CANDIDATE_ID} (${REASON})"
              INACTIVE_LOG="${INACTIVE_LOG}  - ${CANDIDATE_ID} (${REASON})\n"
              DELETION_MATRIX_ITEMS="$(echo "$DELETION_MATRIX_ITEMS" | jq -c \
                --arg deployment_id "$CANDIDATE_ID" \
                '. + [{environment: "dev", deployment_id: $deployment_id}]')"
            else
              echo "Still active: ${CANDIDATE_ID} (${REASON}) -- not a deletion."
            fi
          done

          # Deletion wins: drop any ID from the deployment matrix that also
          # ended up in the deletion matrix (e.g. a deployment that changed
          # to inactive content in the same push helm/goldengate/** changed).
          DEPLOYMENT_MATRIX_ITEMS="$(echo "$DEPLOYMENT_MATRIX_ITEMS" | jq -c \
            --argjson deletions "$DELETION_MATRIX_ITEMS" \
            '[ .[] | select(.deployment_id as $id | ($deletions | map(.deployment_id) | index($id)) == null) ]')"

          echo ""
          echo "Active deployment IDs selected for build/update:"
          echo -e "${ACTIVE_LOG:-  <none>}"

          echo "Inactive/deleted deployment IDs selected for deletion:"
          echo -e "${INACTIVE_LOG:-  <none>}"

          MATRIX_COUNT="$(echo "$DEPLOYMENT_MATRIX_ITEMS" | jq 'length')"

          if [ "$MATRIX_COUNT" -eq 0 ]; then
            echo "No active deployment folders selected for build/update."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "deployment_matrix=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "deployment_matrix=${DEPLOYMENT_MATRIX_ITEMS}" >> "$GITHUB_OUTPUT"
          fi

          DELETION_COUNT="$(echo "$DELETION_MATRIX_ITEMS" | jq 'length')"

          if [ "$DELETION_COUNT" -eq 0 ]; then
            echo "No inactive/deleted deployment folders detected."
            echo "has_deletions=false" >> "$GITHUB_OUTPUT"
            echo "deletion_matrix=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has_deletions=true" >> "$GITHUB_OUTPUT"
            echo "deletion_matrix=${DELETION_MATRIX_ITEMS}" >> "$GITHUB_OUTPUT"
          fi

          echo "Deployment matrix: ${DEPLOYMENT_MATRIX_ITEMS}"
          echo "Deletion matrix: ${DELETION_MATRIX_ITEMS}"

  ensure_observer_image:
    name: Ensure GoldenGate observer image exists in ECR

    needs: detect_changed_deployments
    if: needs.detect_changed_deployments.outputs.has_changes == 'true'

    runs-on: codebuild-${{ vars.PROJECT_NAME_DEV }}-${{ github.run_id }}-${{ github.run_attempt }}

    # Runs once per workflow (not once per deployment matrix item) so the
    # observer image is built at most once per observer-content tree SHA,
    # regardless of how many deployments are selected below.
    environment: dev

    outputs:
      image_repository: ${{ needs.detect_changed_deployments.outputs.observer_image_repository }}
      image_tag: ${{ needs.detect_changed_deployments.outputs.observer_image_tag }}
      image_uri: ${{ needs.detect_changed_deployments.outputs.observer_image_uri }}
      image_existed: ${{ steps.image_check.outputs.image_existed }}
      image_digest: ${{ steps.resolve_digest.outputs.image_digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_ARN }}

      - name: Verify AWS caller account
        shell: bash
        run: |
          set -euo pipefail

          CALLER_ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          echo "Caller account: ${CALLER_ACCOUNT}"

          if [ "$CALLER_ACCOUNT" != "$ECR_ACCOUNT_ID" ]; then
            echo "Unexpected AWS caller account. Expected ${ECR_ACCOUNT_ID} (ECR/build account), got ${CALLER_ACCOUNT}."
            exit 1
          fi

          echo "Confirmed: running in the ECR/build account (${ECR_ACCOUNT_ID})."

      - name: Prepare observer image variables
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          OBSERVER_IMAGE_REPOSITORY="${{ needs.detect_changed_deployments.outputs.observer_image_repository }}"
          OBSERVER_IMAGE_TAG="${{ needs.detect_changed_deployments.outputs.observer_image_tag }}"
          OBSERVER_IMAGE_URI="${{ needs.detect_changed_deployments.outputs.observer_image_uri }}"
          OBSERVER_TREE_SHA="${{ needs.detect_changed_deployments.outputs.observer_tree_sha }}"
          OBSERVER_CHANGED="${{ needs.detect_changed_deployments.outputs.observer_changed }}"

          # OBSERVER_IMAGE_REPOSITORY must be the full registry/repository URI
          # (no tag) -- this is what Helm/Argo CD receive as
          # monitoring.observer.image.repository. OBSERVER_ECR_REPOSITORY
          # (the short name, e.g. "goldengate-observer") stays reserved for
          # AWS CLI operations (describe-repositories, create-repository,
          # describe-images, get/set-repository-policy) below.
          if [[ "$OBSERVER_IMAGE_REPOSITORY" != "${ECR_REGISTRY}/"* ]]; then
            echo "OBSERVER_IMAGE_REPOSITORY does not start with \"${ECR_REGISTRY}/\": ${OBSERVER_IMAGE_REPOSITORY}"
            echo "This must be the full ECR registry/repository URI, not the short repository name, or Helm/Argo CD will render an incomplete image reference."
            exit 1
          fi

          echo "OBSERVER_IMAGE_REPOSITORY=${OBSERVER_IMAGE_REPOSITORY}" >> "$GITHUB_ENV"
          echo "OBSERVER_IMAGE_TAG=${OBSERVER_IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "OBSERVER_IMAGE_URI=${OBSERVER_IMAGE_URI}" >> "$GITHUB_ENV"
          echo "OBSERVER_TREE_SHA=${OBSERVER_TREE_SHA}" >> "$GITHUB_ENV"
          echo "OBSERVER_CHANGED=${OBSERVER_CHANGED}" >> "$GITHUB_ENV"

          echo "Observer ECR repository (short name, for AWS CLI): ${OBSERVER_ECR_REPOSITORY}"
          echo "Observer image repository (full URI, for Docker/Helm/Argo CD): ${OBSERVER_IMAGE_REPOSITORY}"
          echo "Observer tree SHA: ${OBSERVER_TREE_SHA}"
          echo "Observer image tag: ${OBSERVER_IMAGE_TAG}"
          echo "Observer image URI: ${OBSERVER_IMAGE_URI}"
          echo "Observer source changed this trigger: ${OBSERVER_CHANGED}"

      - name: Ensure observer ECR repository exists
        shell: bash
        run: |
          set -euo pipefail

          if aws ecr describe-repositories \
            --region "$AWS_REGION" \
            --repository-names "$OBSERVER_ECR_REPOSITORY" >/dev/null 2>&1; then
            echo "ECR repository already exists: ${OBSERVER_ECR_REPOSITORY}. Not changing its tag mutability."
          else
            echo "Creating ECR repository: ${OBSERVER_ECR_REPOSITORY}"

            aws ecr create-repository \
              --region "$AWS_REGION" \
              --repository-name "$OBSERVER_ECR_REPOSITORY" \
              --tags Key=ApplicationName,Value=CloudFactory Key=DataClassification,Value=General Key=BusinessCriticality,Value=Low Key=BusinessUnit,Value=TechnologyPlatform Key=CostCenter,Value=219 \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability IMMUTABLE >/dev/null

            echo "Created ECR repository: ${OBSERVER_ECR_REPOSITORY} (IMMUTABLE tags, scanOnPush=true)"
          fi

      - name: Ensure observer ECR repository policy allows EKS workload account pull
        shell: bash
        run: |
          set -euo pipefail

          # Adapted from the equivalent merge-in-place approach used for the
          # helm/goldengate chart's ECR repository policy elsewhere in this
          # workflow: existing statements are always preserved, only the Sid
          # below is replaced.
          OBSERVER_EKS_PULL_SID="AllowEksDevAccountPullGoldengateObserver"

          echo "Fetching existing ECR repository policy for ${OBSERVER_ECR_REPOSITORY}..."

          EXISTING_POLICY="$(aws ecr get-repository-policy \
            --region "$AWS_REGION" \
            --repository-name "$OBSERVER_ECR_REPOSITORY" \
            --query policyText \
            --output text 2>/tmp/observer-ecr-get-policy-error.txt)" || {
              if grep -q "RepositoryPolicyNotFoundException" /tmp/observer-ecr-get-policy-error.txt; then
                echo "No existing repository policy found. Starting from an empty policy."
                EXISTING_POLICY='{"Version":"2012-10-17","Statement":[]}'
              else
                echo "Failed to read the existing ECR repository policy:"
                cat /tmp/observer-ecr-get-policy-error.txt
                echo ""
                echo "The workflow role (${ROLE_ARN}) must have ecr:GetRepositoryPolicy and"
                echo "ecr:SetRepositoryPolicy on ${OBSERVER_ECR_REPOSITORY}. Grant those and re-run."
                exit 1
              fi
            }

          echo "Merging in Sid ${OBSERVER_EKS_PULL_SID} (existing statements are preserved)..."

          echo "$EXISTING_POLICY" | jq \
            --arg sid "$OBSERVER_EKS_PULL_SID" \
            '
            .Statement = ([.Statement[] | select(.Sid != $sid)]
              + [{
                  Sid: $sid,
                  Effect: "Allow",
                  Principal: { AWS: "arn:aws:iam::668311715351:root" },
                  Action: [
                    "ecr:BatchCheckLayerAvailability",
                    "ecr:BatchGetImage",
                    "ecr:GetDownloadUrlForLayer"
                  ]
                }])
            ' > /tmp/observer-ecr-repository-policy.json

          aws ecr set-repository-policy \
            --region "$AWS_REGION" \
            --repository-name "$OBSERVER_ECR_REPOSITORY" \
            --policy-text file:///tmp/observer-ecr-repository-policy.json >/dev/null

          echo "ECR repository policy on ${OBSERVER_ECR_REPOSITORY} now allows pull from account 668311715351 (EKS workload account)."

      - name: Check whether the observer image already exists
        id: image_check
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking for existing image: ${OBSERVER_ECR_REPOSITORY}:${OBSERVER_IMAGE_TAG}"

          if aws ecr describe-images \
            --region "$AWS_REGION" \
            --repository-name "$OBSERVER_ECR_REPOSITORY" \
            --image-ids "imageTag=${OBSERVER_IMAGE_TAG}" >/tmp/observer-describe-images.json 2>/tmp/observer-describe-images-error.txt; then
            echo "Image already exists in ECR. Reusing it -- no build or push will occur."
            echo "image_existed=true" >> "$GITHUB_OUTPUT"
            echo "IMAGE_EXISTED=true" >> "$GITHUB_ENV"
          else
            if grep -q "ImageNotFoundException" /tmp/observer-describe-images-error.txt; then
              echo "Image not found in ECR. It will be built and pushed."
              echo "image_existed=false" >> "$GITHUB_OUTPUT"
              echo "IMAGE_EXISTED=false" >> "$GITHUB_ENV"
            else
              echo "Failed to check for the existing observer image:"
              cat /tmp/observer-describe-images-error.txt
              echo ""
              echo "The workflow role (${ROLE_ARN}) must have ecr:DescribeImages on ${OBSERVER_ECR_REPOSITORY}."
              exit 1
            fi
          fi

      - name: Decide whether unit tests are required this run
        shell: bash
        run: |
          set -euo pipefail

          # Tests act as an observer-code gate: they must run whenever the
          # image doesn't exist yet (about to be built) or observer source
          # changed this trigger, but can be skipped when neither is true
          # (a pure Helm-only or deployment-values-only run reusing an
          # already-verified, content-addressed image).
          RUN_TESTS="false"
          if [ "$IMAGE_EXISTED" != "true" ] || [ "$OBSERVER_CHANGED" = "true" ]; then
            RUN_TESTS="true"
          fi

          echo "RUN_TESTS=${RUN_TESTS}" >> "$GITHUB_ENV"
          echo "Run observer unit tests this run: ${RUN_TESTS}"

      - name: Validate observer Python syntax
        if: env.RUN_TESTS == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python3 -m py_compile "${OBSERVER_SOURCE_PATH}/observer.py"
          python3 -m compileall -q "${OBSERVER_SOURCE_PATH}"

      - name: Run observer unit tests
        if: env.RUN_TESTS == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python3 -m unittest discover -s "${OBSERVER_SOURCE_PATH}/tests" -p "test_*.py" -v

      # Everything below this point only runs when the content-addressed
      # image is actually missing from ECR (IMAGE_EXISTED != 'true'). A
      # reused image executes no Docker command at all -- not even a version
      # or daemon check -- so a Helm-only or deployment-values-only run never
      # depends on Docker being present/functional on the runner.

      - name: Verify Docker binary and daemon are functional
        if: env.IMAGE_EXISTED != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is not installed on this runner. This workflow does not install Docker automatically."
            exit 1
          fi

          docker --version

          if ! docker info >/dev/null 2>&1; then
            echo "The docker CLI is present but the daemon is not reachable (docker info failed)."
            echo "This can happen when Docker is on PATH but the daemon/socket is not actually running or connected."
            exit 1
          fi

          echo "Docker binary and daemon are both functional."

      - name: Login to Amazon ECR
        if: env.IMAGE_EXISTED != 'true'
        shell: bash
        run: |
          set -euo pipefail

          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build observer image
        if: env.IMAGE_EXISTED != 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Building ${OBSERVER_IMAGE_URI} from ${OBSERVER_SOURCE_PATH}..."

          docker build \
            --build-arg "OCI_SOURCE=${{ github.server_url }}/${{ github.repository }}" \
            --build-arg "OCI_TITLE=goldengate-observer" \
            --build-arg "OCI_DESCRIPTION=Fail-open GoldenGate monitoring observer sidecar" \
            --build-arg "OCI_VERSION=${OBSERVER_IMAGE_TAG}" \
            -t "$OBSERVER_IMAGE_URI" \
            "$OBSERVER_SOURCE_PATH"

      - name: Push observer image
        if: env.IMAGE_EXISTED != 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Pushing ${OBSERVER_IMAGE_URI}..."
          docker push "$OBSERVER_IMAGE_URI"

      - name: Resolve observer image digest
        id: resolve_digest
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_DIGEST="$(aws ecr describe-images \
            --region "$AWS_REGION" \
            --repository-name "$OBSERVER_ECR_REPOSITORY" \
            --image-ids "imageTag=${OBSERVER_IMAGE_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"

          echo "Observer image digest: ${IMAGE_DIGEST}"
          echo "image_digest=${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Confirm immutable tag is present in ECR
        shell: bash
        run: |
          set -euo pipefail

          aws ecr describe-images \
            --region "$AWS_REGION" \
            --repository-name "$OBSERVER_ECR_REPOSITORY" \
            --image-ids "imageTag=${OBSERVER_IMAGE_TAG}" >/dev/null

          echo "Confirmed: ${OBSERVER_ECR_REPOSITORY}:${OBSERVER_IMAGE_TAG} is present in ECR."

      - name: Observer image summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Observer image"
            echo ""
            echo "- Observer tree SHA: \`${OBSERVER_TREE_SHA:-unknown}\`"
            echo "- Observer image tag: \`${OBSERVER_IMAGE_TAG:-unknown}\`"
            echo "- Observer image URI: \`${OBSERVER_IMAGE_URI:-unknown}\`"
            echo "- Observer source changed this trigger: \`${OBSERVER_CHANGED:-unknown}\`"
            echo "- Image already existed in ECR: \`${IMAGE_EXISTED:-unknown}\`"
            echo ""
            echo "Built once here, outside the deployment matrix. Helm-only and"
            echo "deployment-values-only changes reuse this same image."
          } >> "$GITHUB_STEP_SUMMARY"

  build_publish_and_deploy:
    name: Build, publish, and deploy GoldenGate Helm chart via Argo CD

    needs:
      - detect_changed_deployments
      - ensure_observer_image
    if: needs.detect_changed_deployments.outputs.has_changes == 'true' && needs.ensure_observer_image.result == 'success'

    runs-on: codebuild-${{ vars.PROJECT_NAME_DEV }}-${{ github.run_id }}-${{ github.run_attempt }}

    environment: ${{ matrix.environment }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect_changed_deployments.outputs.deployment_matrix) }}

    concurrency:
      group: goldengate-helm-deploy-${{ github.ref }}-${{ matrix.environment }}-${{ matrix.deployment_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_ARN }}

      - name: Install Helm and kubectl if missing
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking/installing Helm..."

          if ! command -v helm >/dev/null 2>&1; then
            HELM_VERSION="v3.15.4"

            ARCH="$(uname -m)"
            case "$ARCH" in
              x86_64)
                HELM_ARCH="amd64"
                ;;
              aarch64|arm64)
                HELM_ARCH="arm64"
                ;;
              *)
                echo "Unsupported architecture for Helm: $ARCH"
                exit 1
                ;;
            esac

            curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-${HELM_ARCH}.tar.gz" -o /tmp/helm.tar.gz
            tar -zxvf /tmp/helm.tar.gz -C /tmp
            sudo mv "/tmp/linux-${HELM_ARCH}/helm" /usr/local/bin/helm
            sudo chmod +x /usr/local/bin/helm
          fi

          helm version --short

          echo "Checking/installing kubectl..."

          if ! command -v kubectl >/dev/null 2>&1; then
            KUBECTL_VERSION="v1.35.0"

            ARCH="$(uname -m)"
            case "$ARCH" in
              x86_64)
                KUBECTL_ARCH="amd64"
                ;;
              aarch64|arm64)
                KUBECTL_ARCH="arm64"
                ;;
              *)
                echo "Unsupported architecture for kubectl: $ARCH"
                exit 1
                ;;
            esac

            curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${KUBECTL_ARCH}/kubectl" -o /tmp/kubectl
            sudo mv /tmp/kubectl /usr/local/bin/kubectl
            sudo chmod +x /usr/local/bin/kubectl
          fi

          kubectl version --client=true

      - name: Verify runner tools and AWS identity
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking AWS identity..."
          aws sts get-caller-identity

          echo "Checking required tools..."
          aws --version
          helm version --short
          kubectl version --client=true

          echo "Repository variable summary:"
          echo "AWS_REGION=${AWS_REGION}"
          echo "ECR_ACCOUNT_ID=${ECR_ACCOUNT_ID}"
          echo "ECR_REGISTRY=${ECR_REGISTRY}"
          echo "EKS_ACCOUNT_ID=${EKS_ACCOUNT_ID}"
          echo "EKS_CLUSTER_NAME=${EKS_CLUSTER_NAME}"
          echo "EKS_CLUSTER_ARN=${EKS_CLUSTER_ARN}"

      - name: Prepare deployment variables
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          ENVIRONMENT="${{ matrix.environment }}"
          DEPLOYMENT_ID="${{ matrix.deployment_id }}"

          if [[ ! "$DEPLOYMENT_ID" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]]; then
            echo "Invalid deployment_id: $DEPLOYMENT_ID"
            echo "Use lowercase letters, numbers, and hyphens only."
            echo "Example: payments-ora-to-pg-001"
            exit 1
          fi

          TARGET_NAMESPACE="gg-${ENVIRONMENT}-${DEPLOYMENT_ID}"
          RELEASE_NAME="ogg-${DEPLOYMENT_ID}"
          VALUES_FILE="${ENVS_ROOT}/${ENVIRONMENT}/${DEPLOYMENT_ID}/values.yaml"
          TEMP_CHART_PATH="work/charts/${DEPLOYMENT_ID}/goldengate"

          ARGOCD_NAMESPACE="argocd"
          ARGOCD_APP_NAME="goldengate-${DEPLOYMENT_ID}"

          if [ ${#TARGET_NAMESPACE} -gt 63 ]; then
            echo "Namespace is too long: $TARGET_NAMESPACE"
            echo "Kubernetes namespace names must be 63 characters or less."
            echo "Please shorten deployment_id."
            exit 1
          fi

          if [ ${#RELEASE_NAME} -gt 53 ]; then
            echo "Helm release name is too long: $RELEASE_NAME"
            echo "Please shorten deployment_id because resource names add suffixes."
            exit 1
          fi

          # Unique per deployment: matrix jobs for different deployment_ids
          # share the same run_number, so the shared suffix alone would
          # collide when they package different deployment-specific values.
          CHART_VERSION="0.1.${{ github.run_number }}-${DEPLOYMENT_ID}"
          HELM_ECR_REPOSITORY="${HELM_OCI_NAMESPACE}/${CHART_NAME}"
          HELM_PUSH_URL="oci://${ECR_REGISTRY}/${HELM_OCI_NAMESPACE}"
          HELM_CHART_REF="oci://${ECR_REGISTRY}/${HELM_ECR_REPOSITORY}"

          echo "ENVIRONMENT=${ENVIRONMENT}" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> "$GITHUB_ENV"
          echo "TARGET_NAMESPACE=${TARGET_NAMESPACE}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
          echo "VALUES_FILE=${VALUES_FILE}" >> "$GITHUB_ENV"
          echo "TEMP_CHART_PATH=${TEMP_CHART_PATH}" >> "$GITHUB_ENV"
          echo "ARGOCD_NAMESPACE=${ARGOCD_NAMESPACE}" >> "$GITHUB_ENV"
          echo "ARGOCD_APP_NAME=${ARGOCD_APP_NAME}" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"
          echo "HELM_ECR_REPOSITORY=${HELM_ECR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "HELM_PUSH_URL=${HELM_PUSH_URL}" >> "$GITHUB_ENV"
          echo "HELM_CHART_REF=${HELM_CHART_REF}" >> "$GITHUB_ENV"

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "target_namespace=${TARGET_NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "values_file=${VALUES_FILE}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "helm_chart_ref=${HELM_CHART_REF}" >> "$GITHUB_OUTPUT"
          echo "argocd_app_name=${ARGOCD_APP_NAME}" >> "$GITHUB_OUTPUT"

          # Observer image coordinates come from ensure_observer_image /
          # detect_changed_deployments -- never recalculated per matrix item.
          OBSERVER_IMAGE_REPOSITORY="${{ needs.ensure_observer_image.outputs.image_repository }}"
          OBSERVER_IMAGE_TAG="${{ needs.ensure_observer_image.outputs.image_tag }}"
          OBSERVER_IMAGE_URI="${{ needs.ensure_observer_image.outputs.image_uri }}"

          # Defense-in-depth at the exact point Helm consumes this value:
          # monitoring.observer.image.repository must be the full ECR
          # registry/repository URI, never the short repository name alone.
          if [[ "$OBSERVER_IMAGE_REPOSITORY" != "${ECR_REGISTRY}/"* ]]; then
            echo "OBSERVER_IMAGE_REPOSITORY does not start with \"${ECR_REGISTRY}/\": ${OBSERVER_IMAGE_REPOSITORY}"
            echo "Refusing to pass an incomplete image repository to Helm/Argo CD."
            exit 1
          fi

          echo "OBSERVER_IMAGE_REPOSITORY=${OBSERVER_IMAGE_REPOSITORY}" >> "$GITHUB_ENV"
          echo "OBSERVER_IMAGE_TAG=${OBSERVER_IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "OBSERVER_IMAGE_URI=${OBSERVER_IMAGE_URI}" >> "$GITHUB_ENV"

          echo "Observer image repository (full URI): ${OBSERVER_IMAGE_REPOSITORY}"
          echo "Observer image tag: ${OBSERVER_IMAGE_TAG}"
          echo "Observer image URI: ${OBSERVER_IMAGE_URI}"

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$HELM_CHART_PATH/Chart.yaml" ]; then
            echo "Missing Helm Chart.yaml: $HELM_CHART_PATH/Chart.yaml"
            exit 1
          fi

          if [ ! -f "$HELM_CHART_PATH/values.yaml" ]; then
            echo "Missing Helm values.yaml: $HELM_CHART_PATH/values.yaml"
            exit 1
          fi

          if [ ! -f "$VALUES_FILE" ]; then
            echo "Missing deployment values file: $VALUES_FILE"
            echo "Create: envs/${ENVIRONMENT}/${DEPLOYMENT_ID}/values.yaml"
            exit 1
          fi

          echo "Required files are present."
          echo "Helm chart path: $HELM_CHART_PATH"
          echo "Deployment values: $VALUES_FILE"

      - name: Login Helm to Amazon ECR
        shell: bash
        run: |
          set -euo pipefail

          aws ecr get-login-password --region "$AWS_REGION" \
            | helm registry login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Ensure Helm ECR repository exists
        shell: bash
        run: |
          set -euo pipefail

          if aws ecr describe-repositories \
            --region "$AWS_REGION" \
            --repository-names "$HELM_ECR_REPOSITORY" >/dev/null 2>&1; then
            echo "ECR repository already exists: $HELM_ECR_REPOSITORY"
          else
            echo "Creating ECR repository: $HELM_ECR_REPOSITORY"

            aws ecr create-repository \
              --region "$AWS_REGION" \
              --repository-name "$HELM_ECR_REPOSITORY" \
              --tags Key=ApplicationName,Value=CloudFactory Key=DataClassification,Value=General Key=BusinessCriticality,Value=Low Key=BusinessUnit,Value=TechnologyPlatform Key=CostCenter,Value=219 \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE >/dev/null

            echo "Created ECR repository: $HELM_ECR_REPOSITORY"
          fi

      - name: Ensure Helm ECR repository policy allows Argo CD pull
        shell: bash
        run: |
          set -euo pipefail

          # Runs every time (repo newly created or already existing) so the
          # in-cluster Argo CD ECR OCI IRSA role always has pull access,
          # without clobbering any other statements already on this repo.
          ARGOCD_ECR_STATEMENT_SID="AllowArgocdEksRolePullGoldengateHelmChart"

          echo "Fetching existing ECR repository policy for ${HELM_ECR_REPOSITORY}..."

          EXISTING_POLICY="$(aws ecr get-repository-policy \
            --region "$AWS_REGION" \
            --repository-name "$HELM_ECR_REPOSITORY" \
            --query policyText \
            --output text 2>/tmp/ecr-get-policy-error.txt)" || {
              if grep -q "RepositoryPolicyNotFoundException" /tmp/ecr-get-policy-error.txt; then
                echo "No existing repository policy found. Starting from an empty policy."
                EXISTING_POLICY='{"Version":"2012-10-17","Statement":[]}'
              else
                echo "Failed to read the existing ECR repository policy:"
                cat /tmp/ecr-get-policy-error.txt
                echo ""
                echo "The workflow role must have ecr:GetRepositoryPolicy and ecr:SetRepositoryPolicy"
                echo "on this repository. Grant those permissions and re-run."
                exit 1
              fi
            }

          echo "Merging in Sid ${ARGOCD_ECR_STATEMENT_SID} (existing statements are preserved)..."

          echo "$EXISTING_POLICY" | jq \
            --arg sid "$ARGOCD_ECR_STATEMENT_SID" \
            --arg roleArn "$ARGOCD_ECR_READ_ROLE_ARN" \
            '
            .Statement = ([.Statement[] | select(.Sid != $sid)]
              + [{
                  Sid: $sid,
                  Effect: "Allow",
                  Principal: { AWS: $roleArn },
                  Action: [
                    "ecr:BatchCheckLayerAvailability",
                    "ecr:BatchGetImage",
                    "ecr:GetDownloadUrlForLayer",
                    "ecr:DescribeImages",
                    "ecr:DescribeRepositories"
                  ]
                }])
            ' > /tmp/ecr-repository-policy.json

          echo "Applying merged ECR repository policy to ${HELM_ECR_REPOSITORY}..."

          aws ecr set-repository-policy \
            --region "$AWS_REGION" \
            --repository-name "$HELM_ECR_REPOSITORY" \
            --policy-text file:///tmp/ecr-repository-policy.json >/dev/null

          echo "ECR repository policy on ${HELM_ECR_REPOSITORY} now allows pull from ${ARGOCD_ECR_READ_ROLE_ARN}."

      - name: Build Helm dependencies
        shell: bash
        run: |
          set -euo pipefail

          helm dependency build "$HELM_CHART_PATH" || true

      - name: Helm lint deployment
        shell: bash
        run: |
          set -euo pipefail

          helm lint "$HELM_CHART_PATH" \
            --values "$VALUES_FILE" \
            --set global.environment="$ENVIRONMENT" \
            --set global.deploymentId="$DEPLOYMENT_ID" \
            --set-string monitoring.observer.image.repository="$OBSERVER_IMAGE_REPOSITORY" \
            --set-string monitoring.observer.image.tag="$OBSERVER_IMAGE_TAG"

      - name: Render manifest for validation
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p rendered

          helm template "$RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace "$TARGET_NAMESPACE" \
            --values "$VALUES_FILE" \
            --set global.environment="$ENVIRONMENT" \
            --set global.deploymentId="$DEPLOYMENT_ID" \
            --set-string monitoring.observer.image.repository="$OBSERVER_IMAGE_REPOSITORY" \
            --set-string monitoring.observer.image.tag="$OBSERVER_IMAGE_TAG" \
            > "rendered/${RELEASE_NAME}.yaml"

          echo "Rendered manifest: rendered/${RELEASE_NAME}.yaml"

      - name: Validate GoldenGate namespace is rendered
        shell: bash
        run: |
          set -euo pipefail

          RENDERED="rendered/${RELEASE_NAME}.yaml"

          echo "Checking rendered manifest for the GoldenGate Namespace: ${RENDERED}"

          # Fails before package/push/deploy if helm/goldengate/templates/namespace.yaml
          # is missing, misconfigured, or the ownership labels don't match this
          # deployment -- the namespace is now an Argo CD-managed resource, so it
          # must render correctly for cleanup to work on deletion.
          grep -q "kind: Namespace" "$RENDERED"
          grep -q "name: ${TARGET_NAMESPACE}" "$RENDERED"
          grep -q "goldengate.adcb/deployment-id: \"${DEPLOYMENT_ID}\"" "$RENDERED"
          grep -q "goldengate.adcb/environment: \"${ENVIRONMENT}\"" "$RENDERED"

          echo "OK: Namespace ${TARGET_NAMESPACE} is present in the rendered manifest with the expected ownership labels."

      - name: Validate EFS persistence resources are rendered
        shell: bash
        run: |
          set -euo pipefail

          RENDERED="rendered/${RELEASE_NAME}.yaml"

          PERSISTENCE_EFS_ENABLED="false"
          if grep -A2 '^persistence:' "$VALUES_FILE" | grep -q 'enabled: true' \
            && grep -A2 '^persistence:' "$VALUES_FILE" | grep -q 'provider: efs'; then
            PERSISTENCE_EFS_ENABLED="true"
          fi

          if [ "$PERSISTENCE_EFS_ENABLED" != "true" ]; then
            echo "persistence.enabled/provider=efs not set in ${VALUES_FILE}. Skipping EFS persistence render checks."
            exit 0
          fi

          echo "persistence.enabled=true and provider=efs in ${VALUES_FILE}. Checking rendered manifest: ${RENDERED}"

          EFS_FILESYSTEM_ID="$(grep -E '^\s*fileSystemId:' "$VALUES_FILE" | head -1 | sed -E 's/^\s*fileSystemId:\s*//' | tr -d '"'"'"'\r' | xargs)"

          if [ -z "$EFS_FILESYSTEM_ID" ]; then
            echo "persistence.efs.fileSystemId not found in ${VALUES_FILE}. Cannot validate the rendered StorageClass."
            exit 1
          fi

          STORAGE_CLASS_NAME="gg-efs-${ENVIRONMENT}-${DEPLOYMENT_ID}"

          # PVC claim names and the EFS basePath are read from the values
          # file rather than re-derived from ENVIRONMENT/DEPLOYMENT_ID: EFS
          # enforces a 100-character access point path limit (basePath +
          # PVC name + a unique suffix), so deployments intentionally set
          # short, explicit claimName/basePath overrides instead of using
          # the long environment-deploymentId-based generated defaults.
          SOURCE_BLOCK="$(awk '/^source:/{flag=1} flag{print} /^[a-zA-Z]/{if(flag && !/^source:/) exit}' "$VALUES_FILE")"
          TARGET_BLOCK="$(awk '/^target:/{flag=1} flag{print} /^[a-zA-Z]/{if(flag && !/^target:/) exit}' "$VALUES_FILE")"

          SOURCE_PVC_NAME="$(echo "$SOURCE_BLOCK" | grep -E '^\s*claimName:' | head -1 | sed -E 's/^\s*claimName:\s*//' | tr -d '"'"'"'\r' | xargs)"
          TARGET_PVC_NAME="$(echo "$TARGET_BLOCK" | grep -E '^\s*claimName:' | head -1 | sed -E 's/^\s*claimName:\s*//' | tr -d '"'"'"'\r' | xargs)"

          if [ -z "$SOURCE_PVC_NAME" ] || [ -z "$TARGET_PVC_NAME" ]; then
            echo "source.storage.u02.claimName or target.storage.u02.claimName not found in ${VALUES_FILE}. Cannot validate the rendered PVCs."
            exit 1
          fi

          EFS_BASE_PATH="$(grep -E '^\s*basePath:' "$VALUES_FILE" | head -1 | sed -E 's/^\s*basePath:\s*//' | tr -d '"'"'"'\r' | xargs)"

          if [ -z "$EFS_BASE_PATH" ]; then
            echo "persistence.efs.storageClass.basePath not found in ${VALUES_FILE}. Cannot validate the rendered StorageClass."
            exit 1
          fi

          echo "Checking StorageClass ${STORAGE_CLASS_NAME}..."
          grep -q "kind: StorageClass" "$RENDERED"
          grep -q "name: ${STORAGE_CLASS_NAME}" "$RENDERED"
          grep -q "provisioner: efs.csi.aws.com" "$RENDERED"
          grep -q "provisioningMode: efs-ap" "$RENDERED"
          grep -q "fileSystemId: \"${EFS_FILESYSTEM_ID}\"" "$RENDERED"
          grep -q "basePath: \"${EFS_BASE_PATH}\"" "$RENDERED"
          grep -q 'subPathPattern: "\${.PVC.name}"' "$RENDERED"
          grep -q 'ensureUniqueDirectory: "true"' "$RENDERED"
          grep -q "reclaimPolicy: Retain" "$RENDERED"

          echo "Checking PersistentVolumeClaims ${SOURCE_PVC_NAME} / ${TARGET_PVC_NAME}..."
          grep -q "kind: PersistentVolumeClaim" "$RENDERED"
          grep -q "name: ${SOURCE_PVC_NAME}" "$RENDERED"
          grep -q "name: ${TARGET_PVC_NAME}" "$RENDERED"

          echo "Checking StatefulSet volumes (u02 must use persistentVolumeClaim with the expected claimName, u03 must stay emptyDir)..."

          # Isolate each StatefulSet's own rendered document so the u02/u03
          # check is unambiguous -- a plain grep across the whole manifest
          # can't tell the source StatefulSet's volumes apart from the
          # target StatefulSet's.
          SOURCE_STS="$(awk '/^# Source: .*source-statefulset\.yaml$/{flag=1} flag{print} /^---$/{if(flag) exit}' "$RENDERED")"
          TARGET_STS="$(awk '/^# Source: .*target-statefulset\.yaml$/{flag=1} flag{print} /^---$/{if(flag) exit}' "$RENDERED")"

          echo "$SOURCE_STS" | grep -A1 "^        - name: u02" | grep -q "persistentVolumeClaim:"
          echo "$SOURCE_STS" | grep -q "claimName: ${SOURCE_PVC_NAME}"
          echo "$SOURCE_STS" | grep -A1 "^        - name: u03" | grep -q "emptyDir: {}"

          echo "$TARGET_STS" | grep -A1 "^        - name: u02" | grep -q "persistentVolumeClaim:"
          echo "$TARGET_STS" | grep -q "claimName: ${TARGET_PVC_NAME}"
          echo "$TARGET_STS" | grep -A1 "^        - name: u03" | grep -q "emptyDir: {}"

          echo "OK: EFS StorageClass, source/target PVCs, and StatefulSet u02/u03 volumes all match the expected persistence configuration."

      - name: Validate observer sidecar is rendered correctly
        shell: bash
        run: |
          set -euo pipefail

          RENDERED="rendered/${RELEASE_NAME}.yaml"

          SOURCE_PIPELINE="gg-${DEPLOYMENT_ID}-source"
          TARGET_PIPELINE="gg-${DEPLOYMENT_ID}-target"

          # The rendered manifest is authoritative: no Python/PyYAML is used
          # here. A component's StatefulSet either rendered or it didn't
          # (component disabled) -- derived directly from the manifest text,
          # so this never silently no-ops when PyYAML happens to be missing
          # on the runner.
          SOURCE_STS="$(awk '/^# Source: .*source-statefulset\.yaml$/{flag=1} flag{print} /^---$/{if(flag) exit}' "$RENDERED")"
          TARGET_STS="$(awk '/^# Source: .*target-statefulset\.yaml$/{flag=1} flag{print} /^---$/{if(flag) exit}' "$RENDERED")"

          SOURCE_ENABLED="false"
          [ -n "$SOURCE_STS" ] && SOURCE_ENABLED="true"

          TARGET_ENABLED="false"
          [ -n "$TARGET_STS" ] && TARGET_ENABLED="true"

          echo "SOURCE_ENABLED=${SOURCE_ENABLED}" >> "$GITHUB_ENV"
          echo "TARGET_ENABLED=${TARGET_ENABLED}" >> "$GITHUB_ENV"

          if [ "$SOURCE_ENABLED" != "true" ] && [ "$TARGET_ENABLED" != "true" ]; then
            echo "FAIL: neither source nor target is enabled for this deployment -- there is no rendered StatefulSet to carry the goldengate.adcb/observer-enabled annotation, so the effective observer expectation cannot be verified."
            exit 1
          fi

          # OBSERVER_EXPECTED comes from the rendered goldengate.adcb/observer-enabled
          # pod-template annotation (set directly from .Values.monitoring.observer.enabled
          # in both source-statefulset.yaml and target-statefulset.yaml), NOT from
          # whether an observer container happens to be present. This is what catches a
          # chart defect that silently omits the sidecar despite the flag being true --
          # the previous container-presence-only check would have reported
          # OBSERVER_ENABLED=false and skipped validation in exactly that case.
          extract_observer_annotation() {
            grep -o 'goldengate\.adcb/observer-enabled: "[a-z]*"' | head -1 | sed -E 's/.*: "([a-z]*)"/\1/'
          }

          SOURCE_OBSERVER_ANNOTATION=""
          [ "$SOURCE_ENABLED" = "true" ] && SOURCE_OBSERVER_ANNOTATION="$(echo "$SOURCE_STS" | extract_observer_annotation)"

          TARGET_OBSERVER_ANNOTATION=""
          [ "$TARGET_ENABLED" = "true" ] && TARGET_OBSERVER_ANNOTATION="$(echo "$TARGET_STS" | extract_observer_annotation)"

          OBSERVER_EXPECTED=""
          if [ -n "$SOURCE_OBSERVER_ANNOTATION" ]; then
            OBSERVER_EXPECTED="$SOURCE_OBSERVER_ANNOTATION"
          fi
          if [ -n "$TARGET_OBSERVER_ANNOTATION" ]; then
            if [ -n "$OBSERVER_EXPECTED" ] && [ "$OBSERVER_EXPECTED" != "$TARGET_OBSERVER_ANNOTATION" ]; then
              echo "FAIL: inconsistent goldengate.adcb/observer-enabled annotation -- source=${SOURCE_OBSERVER_ANNOTATION}, target=${TARGET_OBSERVER_ANNOTATION}. Both derive from the same monitoring.observer.enabled value and must agree."
              exit 1
            fi
            OBSERVER_EXPECTED="$TARGET_OBSERVER_ANNOTATION"
          fi

          if [ -z "$OBSERVER_EXPECTED" ]; then
            echo "FAIL: could not find the goldengate.adcb/observer-enabled annotation on any rendered, enabled StatefulSet."
            exit 1
          fi

          echo "OBSERVER_EXPECTED=${OBSERVER_EXPECTED}" >> "$GITHUB_ENV"
          echo "Effective observer expectation (from rendered goldengate.adcb/observer-enabled annotation): ${OBSERVER_EXPECTED}"

          # Actual observer-container presence is derived independently of
          # OBSERVER_EXPECTED, by isolating just the goldengate-observer
          # container's own YAML block: from its "- name: goldengate-observer"
          # line up to (not including) the next sibling container
          # ("        - name:") or the pod-level "volumes:" section -- both
          # are 6/8-space-indented, so this never bleeds into the main
          # container or the Pod's volumes: list (which legitimately
          # references ogg-admin-csi/ogg-nginx-cert-csi for the main
          # container and would otherwise cause false-positive matches).
          extract_observer_block() {
            awk '
              capture && /^        - name:/ && $0 !~ /goldengate-observer/ { exit }
              capture && /^      volumes:/ { exit }
              /^        - name: goldengate-observer/ { capture=1 }
              capture { print }
            '
          }

          SOURCE_OBSERVER_BLOCK=""
          SOURCE_OBSERVER_PRESENT="false"
          if [ "$SOURCE_ENABLED" = "true" ]; then
            SOURCE_OBSERVER_BLOCK="$(echo "$SOURCE_STS" | extract_observer_block)"
            [ -n "$SOURCE_OBSERVER_BLOCK" ] && SOURCE_OBSERVER_PRESENT="true"
          fi

          TARGET_OBSERVER_BLOCK=""
          TARGET_OBSERVER_PRESENT="false"
          if [ "$TARGET_ENABLED" = "true" ]; then
            TARGET_OBSERVER_BLOCK="$(echo "$TARGET_STS" | extract_observer_block)"
            [ -n "$TARGET_OBSERVER_BLOCK" ] && TARGET_OBSERVER_PRESENT="true"
          fi

          echo "SOURCE_OBSERVER_ENABLED=${SOURCE_OBSERVER_PRESENT}" >> "$GITHUB_ENV"
          echo "TARGET_OBSERVER_ENABLED=${TARGET_OBSERVER_PRESENT}" >> "$GITHUB_ENV"

          echo "Source StatefulSet rendered: ${SOURCE_ENABLED} (observer container present: ${SOURCE_OBSERVER_PRESENT})"
          echo "Target StatefulSet rendered: ${TARGET_ENABLED} (observer container present: ${TARGET_OBSERVER_PRESENT})"

          # Downstream steps (e.g. runtime verification) key off OBSERVER_ENABLED
          # as the effective expectation, not container presence.
          echo "OBSERVER_ENABLED=${OBSERVER_EXPECTED}" >> "$GITHUB_ENV"

          if [ "$OBSERVER_EXPECTED" = "false" ]; then
            if [ "$SOURCE_OBSERVER_PRESENT" = "true" ] || [ "$TARGET_OBSERVER_PRESENT" = "true" ]; then
              echo "FAIL: goldengate.adcb/observer-enabled=false, but a goldengate-observer container was rendered anyway."
              exit 1
            fi
            echo "goldengate.adcb/observer-enabled=false and no observer container rendered anywhere, as expected. Skipping observer render checks and runtime verification."
            exit 0
          fi

          echo "goldengate.adcb/observer-enabled=true. Validating rendered observer containers..."

          if [ "$SOURCE_ENABLED" = "true" ] && [ "$SOURCE_OBSERVER_PRESENT" != "true" ]; then
            echo "FAIL: source is enabled and goldengate.adcb/observer-enabled=true, but no goldengate-observer container was found in the rendered source StatefulSet."
            exit 1
          fi

          if [ "$TARGET_ENABLED" = "true" ] && [ "$TARGET_OBSERVER_PRESENT" != "true" ]; then
            echo "FAIL: target is enabled and goldengate.adcb/observer-enabled=true, but no goldengate-observer container was found in the rendered target StatefulSet."
            exit 1
          fi

          # Main container names are configurable (source.containerName /
          # target.containerName); derive them from the deployment values
          # file with the same plain-text awk/grep technique already used
          # above in this workflow (see the EFS persistence validation step)
          # rather than assuming ogg-oracle/ogg-postgresql always apply.
          SOURCE_VALUES_BLOCK="$(awk '/^source:/{flag=1} flag{print} /^[a-zA-Z]/{if(flag && !/^source:/) exit}' "$VALUES_FILE")"
          TARGET_VALUES_BLOCK="$(awk '/^target:/{flag=1} flag{print} /^[a-zA-Z]/{if(flag && !/^target:/) exit}' "$VALUES_FILE")"

          SOURCE_MAIN_CONTAINER="$(echo "$SOURCE_VALUES_BLOCK" | grep -E '^\s*containerName:' | head -1 | sed -E 's/^\s*containerName:\s*//' | tr -d '"'"'"'\r' | xargs)"
          SOURCE_MAIN_CONTAINER="${SOURCE_MAIN_CONTAINER:-ogg-oracle}"

          TARGET_MAIN_CONTAINER="$(echo "$TARGET_VALUES_BLOCK" | grep -E '^\s*containerName:' | head -1 | sed -E 's/^\s*containerName:\s*//' | tr -d '"'"'"'\r' | xargs)"
          TARGET_MAIN_CONTAINER="${TARGET_MAIN_CONTAINER:-ogg-postgresql}"

          echo "SOURCE_MAIN_CONTAINER=${SOURCE_MAIN_CONTAINER}" >> "$GITHUB_ENV"
          echo "TARGET_MAIN_CONTAINER=${TARGET_MAIN_CONTAINER}" >> "$GITHUB_ENV"

          for LABEL in SOURCE TARGET; do
            if [ "$LABEL" = "SOURCE" ]; then
              ENABLED="$SOURCE_ENABLED"; STS="$SOURCE_STS"; OBSERVER_BLOCK="$SOURCE_OBSERVER_BLOCK"
              COMPONENT="source"; PIPELINE="$SOURCE_PIPELINE"; MAIN_CONTAINER="$SOURCE_MAIN_CONTAINER"
            else
              ENABLED="$TARGET_ENABLED"; STS="$TARGET_STS"; OBSERVER_BLOCK="$TARGET_OBSERVER_BLOCK"
              COMPONENT="target"; PIPELINE="$TARGET_PIPELINE"; MAIN_CONTAINER="$TARGET_MAIN_CONTAINER"
            fi

            if [ "$ENABLED" != "true" ]; then
              echo "${LABEL} is not enabled for this deployment (no StatefulSet rendered). Skipping observer checks for ${LABEL}."
              continue
            fi

            echo "Checking ${LABEL} StatefulSet observer container..."

            OBSERVER_COUNT="$(echo "$STS" | grep -c "^        - name: goldengate-observer" || true)"
            if [ "$OBSERVER_COUNT" -ne 1 ]; then
              echo "FAIL: expected exactly one goldengate-observer container in the rendered ${LABEL} StatefulSet, found ${OBSERVER_COUNT}."
              exit 1
            fi

            echo "$OBSERVER_BLOCK" | grep -q "image: \"${OBSERVER_IMAGE_URI}\""
            echo "$OBSERVER_BLOCK" | grep -q "value: \"${COMPONENT}\""
            echo "$OBSERVER_BLOCK" | grep -q "value: \"${PIPELINE}\""

            # Compare the volume mount against the configured U02_PATH taken
            # from the container's own rendered env (not a hardcoded /u02),
            # so this check still means something if u02Path is overridden.
            CONFIGURED_U02_PATH="$(echo "$OBSERVER_BLOCK" | awk '/name: U02_PATH/{getline; print; exit}' | sed -E 's/^\s*value:\s*//' | tr -d '"'"'"'\r' | xargs)"
            if [ -z "$CONFIGURED_U02_PATH" ]; then
              echo "FAIL: could not determine U02_PATH from the rendered ${LABEL} goldengate-observer container env."
              exit 1
            fi
            echo "$OBSERVER_BLOCK" | grep -A2 "name: u02" | grep -q "mountPath: ${CONFIGURED_U02_PATH}"
            echo "$OBSERVER_BLOCK" | grep -A2 "name: u02" | grep -q "readOnly: true"
            echo "$OBSERVER_BLOCK" | grep -q "path: /healthz"

            if echo "$OBSERVER_BLOCK" | grep -q "readinessProbe:"; then
              echo "FAIL: unexpected readinessProbe found on the ${LABEL} goldengate-observer container."
              exit 1
            fi

            if echo "$OBSERVER_BLOCK" | grep -q "ogg-admin-csi\|ogg-nginx-cert-csi\|secretKeyRef\|envFrom"; then
              echo "FAIL: unexpected secret/CSI mount found on the ${LABEL} goldengate-observer container."
              exit 1
            fi

            echo "$STS" | grep -q "name: ${MAIN_CONTAINER}"

            echo "OK: ${LABEL} goldengate-observer container validated (u02Path=${CONFIGURED_U02_PATH})."
          done

          echo "OK: goldengate-observer render validation passed for all enabled components."

      - name: Package deployment-specific Helm chart
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p packaged
          rm -rf "$TEMP_CHART_PATH"
          mkdir -p "$TEMP_CHART_PATH"

          # Argo CD (running inside the private EKS cluster) cannot reach
          # this GitHub repo's envs/dev/<id>/values.yaml path directly, so
          # the deployment values file is baked into a deployment-specific,
          # self-contained copy of the chart before packaging.
          echo "Copying base chart from $HELM_CHART_PATH into $TEMP_CHART_PATH..."
          cp -a "$HELM_CHART_PATH/." "$TEMP_CHART_PATH/"

          echo "Copying deployment values file $VALUES_FILE into $TEMP_CHART_PATH/values-deployment.yaml..."
          cp "$VALUES_FILE" "$TEMP_CHART_PATH/values-deployment.yaml"

          helm package "$TEMP_CHART_PATH" \
            --version "$CHART_VERSION" \
            --app-version "$CHART_VERSION" \
            --destination packaged

          ls -lrt packaged

      - name: Push Helm chart to ECR as OCI artifact
        shell: bash
        run: |
          set -euo pipefail

          helm push "packaged/${CHART_NAME}-${CHART_VERSION}.tgz" "$HELM_PUSH_URL"

          echo "Published Helm chart:"
          echo "$HELM_CHART_REF:$CHART_VERSION"

      - name: Verify Helm chart can be pulled from ECR
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p pulled

          helm pull "$HELM_CHART_REF" \
            --version "$CHART_VERSION" \
            --destination pulled

          ls -lrt pulled

      - name: Connect to EKS cluster
        if: ${{ matrix.deploy }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Target EKS cluster name: ${EKS_CLUSTER_NAME}"
          echo "Target EKS cluster ARN: ${EKS_CLUSTER_ARN}"
          echo "Target EKS account ID: ${EKS_ACCOUNT_ID}"
          echo "Current AWS identity:"
          aws sts get-caller-identity

          echo "Connecting to EKS using cross-account EKS deploy role:"
          echo "${EKS_DEPLOY_ROLE_ARN}"

          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}" \
            --role-arn "${EKS_DEPLOY_ROLE_ARN}" \
            --assume-role-arn "${EKS_DEPLOY_ROLE_ARN}"

          echo "Current kube context:"
          kubectl config current-context
          kubectl version --client=true

          echo "Verifying EKS access..."

          echo "Checking permission to read CSIDriver..."
          kubectl auth can-i get csidrivers.storage.k8s.io || true

          echo "Checking permission to read SecretProviderClass..."
          kubectl auth can-i get secretproviderclasses.secrets-store.csi.x-k8s.io --all-namespaces || true

          echo "Checking permission to manage Argo CD Applications..."
          kubectl auth can-i create applications.argoproj.io -n "${ARGOCD_NAMESPACE}" || true

      - name: Validate Secrets Store CSI configuration
        if: ${{ matrix.deploy }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking Secrets Store CSI Driver prerequisites..."

          echo "Checking CSIDriver secrets-store.csi.k8s.io exists..."
          kubectl get csidriver secrets-store.csi.k8s.io >/dev/null || {
            echo "CSIDriver secrets-store.csi.k8s.io not found. Secrets Store CSI Driver is not installed on this cluster."
            exit 1
          }

          echo "Checking SecretProviderClass CRD exists..."
          kubectl get crd secretproviderclasses.secrets-store.csi.x-k8s.io >/dev/null || {
            echo "CRD secretproviderclasses.secrets-store.csi.x-k8s.io not found."
            exit 1
          }

          echo "Checking CSIDriver tokenRequests audiences..."
          TOKEN_REQUESTS="$(kubectl get csidriver secrets-store.csi.k8s.io -o jsonpath='{.spec.tokenRequests}')"

          echo "${TOKEN_REQUESTS}" | grep -q "sts.amazonaws.com" || {
            echo "CSIDriver secrets-store.csi.k8s.io is missing tokenRequests audience sts.amazonaws.com."
            echo "Current tokenRequests: ${TOKEN_REQUESTS}"
            exit 1
          }

          echo "${TOKEN_REQUESTS}" | grep -q "pods.eks.amazonaws.com" || {
            echo "CSIDriver secrets-store.csi.k8s.io is missing tokenRequests audience pods.eks.amazonaws.com."
            echo "Current tokenRequests: ${TOKEN_REQUESTS}"
            exit 1
          }

          echo "tokenRequests OK: ${TOKEN_REQUESTS}"

          echo "Checking Secrets Store CSI Driver Helm release for syncSecret.enabled..."
          if helm status secrets-store-csi-driver -n kube-system >/dev/null 2>&1; then
            SYNC_SECRET_VALUES="$(helm get values secrets-store-csi-driver -n kube-system -a | grep -A3 -i syncSecret || true)"

            echo "${SYNC_SECRET_VALUES}"

            echo "${SYNC_SECRET_VALUES}" | grep -qi "enabled: true" || {
              echo "syncSecret.enabled=true not found in Helm release secrets-store-csi-driver."
              echo "GoldenGate admin credentials require CSI secretObjects to sync AWS Secrets Manager data into Kubernetes Secret ogg-oracle-admin."
              exit 1
            }

            echo "syncSecret.enabled=true confirmed."
          else
            echo "Helm release secrets-store-csi-driver not found in kube-system. Skipping syncSecret check (driver may be managed outside Helm)."
          fi

          echo "Secrets Store CSI Driver prerequisites validated."

      - name: Ensure Argo CD Application CRD exists
        if: ${{ matrix.deploy }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking Argo CD Application CRD..."

          kubectl get crd applications.argoproj.io >/dev/null || {
            echo "CRD applications.argoproj.io not found."
            echo "Argo CD must be installed on this cluster before GoldenGate can be deployed through it."
            echo "Run the argocd-eks-deployment.yaml workflow first."
            exit 1
          }

          echo "Argo CD Application CRD is present."

      - name: (Emergency fallback only) Refresh temporary Argo CD ECR OCI password
        # Not the long-term auth path. Long-term, Argo CD's ECR OCI repository
        # credentials are refreshed in-cluster by the argocd-ecr-token-sync
        # component via IRSA role GoldenGateArgocdECRRead-dev (see
        # policies/argocd-ecr-oci-read-dev/ and the ECR repository policy
        # step above). This step only runs if explicitly enabled via the
        # ENABLE_TEMP_ARGOCD_ECR_PASSWORD_INJECTION repository variable, for
        # emergency use before that component is deployed.
        if: ${{ matrix.deploy && vars.ENABLE_TEMP_ARGOCD_ECR_PASSWORD_INJECTION == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "EMERGENCY FALLBACK: injecting a short-lived ECR password into Argo CD."
          echo "This is not the long-term auth path -- disable ENABLE_TEMP_ARGOCD_ECR_PASSWORD_INJECTION"
          echo "once the in-cluster argocd-ecr-token-sync (IRSA role GoldenGateArgocdECRRead-dev) is live."

          ECR_PASSWORD="$(aws ecr get-login-password --region "$AWS_REGION")"

          cat <<EOF | kubectl apply -f - >/dev/null
          apiVersion: v1
          kind: Secret
          metadata:
            name: argocd-ecr-goldengate-oci
            namespace: ${ARGOCD_NAMESPACE}
            labels:
              argocd.argoproj.io/secret-type: repository
          stringData:
            type: helm
            enableOCI: "true"
            url: ${ECR_REGISTRY}/${HELM_OCI_NAMESPACE}/${CHART_NAME}
            username: AWS
            password: "${ECR_PASSWORD}"
          EOF

          unset ECR_PASSWORD

          echo "Argo CD repository credentials Secret applied: argocd-ecr-goldengate-oci"

      - name: Create or update Argo CD Application
        if: ${{ matrix.deploy }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Applying Argo CD Application: ${ARGOCD_APP_NAME}"

          cat <<EOF | kubectl apply -f -
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${ARGOCD_APP_NAME}
            namespace: ${ARGOCD_NAMESPACE}
            finalizers:
              - resources-finalizer.argocd.argoproj.io
            labels:
              app.kubernetes.io/name: goldengate
              app.kubernetes.io/managed-by: argocd
              goldengate.adcb/environment: ${ENVIRONMENT}
              goldengate.adcb/deployment-id: ${DEPLOYMENT_ID}
          spec:
            project: default
            source:
              repoURL: ${HELM_CHART_REF}
              targetRevision: ${CHART_VERSION}
              path: .
              helm:
                releaseName: ${RELEASE_NAME}
                valueFiles:
                  - values-deployment.yaml
                parameters:
                  - name: global.environment
                    value: ${ENVIRONMENT}
                  - name: global.deploymentId
                    value: ${DEPLOYMENT_ID}
                  - name: monitoring.observer.image.repository
                    value: ${OBSERVER_IMAGE_REPOSITORY}
                  - name: monitoring.observer.image.tag
                    value: ${OBSERVER_IMAGE_TAG}
            destination:
              server: https://kubernetes.default.svc
              namespace: ${TARGET_NAMESPACE}
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
              managedNamespaceMetadata:
                labels:
                  app.kubernetes.io/name: goldengate
                  app.kubernetes.io/managed-by: argocd
                  goldengate.adcb/environment: ${ENVIRONMENT}
                  goldengate.adcb/deployment-id: ${DEPLOYMENT_ID}
            revisionHistoryLimit: 10
          EOF

          echo "Forcing Argo CD refresh for ${ARGOCD_APP_NAME}..."

          kubectl annotate application "${ARGOCD_APP_NAME}" \
            -n "${ARGOCD_NAMESPACE}" \
            argocd.argoproj.io/refresh=hard \
            --overwrite

      - name: Wait for Argo CD sync and health
        if: ${{ matrix.deploy }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for Argo CD Application ${ARGOCD_APP_NAME} to become Synced and Healthy..."

          TIMEOUT_SECONDS=1200
          INTERVAL_SECONDS=30
          ELAPSED=0

          while true; do
            if kubectl get application "${ARGOCD_APP_NAME}" -n "${ARGOCD_NAMESPACE}" >/dev/null 2>&1; then
              SYNC_STATUS="$(kubectl get application "${ARGOCD_APP_NAME}" -n "${ARGOCD_NAMESPACE}" -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")"
              HEALTH_STATUS="$(kubectl get application "${ARGOCD_APP_NAME}" -n "${ARGOCD_NAMESPACE}" -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")"
              OPERATION_PHASE="$(kubectl get application "${ARGOCD_APP_NAME}" -n "${ARGOCD_NAMESPACE}" -o jsonpath='{.status.operationState.phase}' 2>/dev/null || echo "")"

              echo "[$(date -u +%H:%M:%S)] sync=${SYNC_STATUS} health=${HEALTH_STATUS} operation=${OPERATION_PHASE:-none} (elapsed ${ELAPSED}s / ${TIMEOUT_SECONDS}s)"

              if [ "${HEALTH_STATUS}" = "Degraded" ]; then
                echo "Argo CD Application ${ARGOCD_APP_NAME} is Degraded."
                kubectl get application "${ARGOCD_APP_NAME}" -n "${ARGOCD_NAMESPACE}" -o wide
                exit 1
              fi

              if [ "${OPERATION_PHASE}" = "Failed" ] || [ "${OPERATION_PHASE}" = "Error" ]; then
                echo "Argo CD sync operation for ${ARGOCD_APP_NAME} ${OPERATION_PHASE}."
                kubectl describe application "${ARGOCD_APP_NAME}" -n "${ARGOCD_NAMESPACE}"
                exit 1
              fi

              if [ "${SYNC_STATUS}" = "Synced" ] && [ "${HEALTH_STATUS}" = "Healthy" ]; then
                echo "Argo CD Application ${ARGOCD_APP_NAME} is Synced and Healthy."
                break
              fi
            else
              echo "[$(date -u +%H:%M:%S)] Argo CD Application ${ARGOCD_APP_NAME} not found yet (elapsed ${ELAPSED}s / ${TIMEOUT_SECONDS}s)."
            fi

            if [ "${ELAPSED}" -ge "${TIMEOUT_SECONDS}" ]; then
              echo "Timed out after ${TIMEOUT_SECONDS}s waiting for ${ARGOCD_APP_NAME} to become Synced and Healthy."
              kubectl get application "${ARGOCD_APP_NAME}" -n "${ARGOCD_NAMESPACE}" -o wide || true
              kubectl describe application "${ARGOCD_APP_NAME}" -n "${ARGOCD_NAMESPACE}" || true
              exit 1
            fi

            sleep "${INTERVAL_SECONDS}"
            ELAPSED=$((ELAPSED + INTERVAL_SECONDS))
          done

          echo "Final Argo CD Application status:"
          kubectl get application "${ARGOCD_APP_NAME}" -n "${ARGOCD_NAMESPACE}" -o wide

      - name: Verify Argo CD deployment
        if: ${{ matrix.deploy }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Argo CD Application:"
          kubectl get application "$ARGOCD_APP_NAME" -n "$ARGOCD_NAMESPACE" -o wide

          echo ""
          echo "Argo CD Application details:"
          kubectl describe application "$ARGOCD_APP_NAME" -n "$ARGOCD_NAMESPACE"

          echo ""
          echo "Kubernetes resources in target namespace:"
          kubectl get all -n "$TARGET_NAMESPACE" || true

          echo ""
          echo "Ingress:"
          kubectl get ingress -n "$TARGET_NAMESPACE" || true

          echo ""
          echo "PVCs:"
          kubectl get pvc -n "$TARGET_NAMESPACE" || true

          echo ""
          echo "EFS StorageClass for this deployment:"
          # Not fatal: grep exits non-zero if no line matches, but that's a
          # meaningful "not found" signal here, not a script failure.
          kubectl get storageclass | grep "gg-efs-${ENVIRONMENT}-${DEPLOYMENT_ID}" || true

          echo ""
          echo "PersistentVolumes (cluster-scoped; PV output may not show namespace"
          echo "depending on -o format, so this is informational, not filtered):"
          kubectl get pv || true

          echo ""
          echo "PVC details:"
          kubectl describe pvc -n "$TARGET_NAMESPACE" || true

      - name: Verify GoldenGate observer runtime state
        if: ${{ matrix.deploy }}
        shell: bash
        run: |
          set -euo pipefail

          echo "SOURCE_OBSERVER_STATUS=not_run" >> "$GITHUB_ENV"
          echo "TARGET_OBSERVER_STATUS=not_run" >> "$GITHUB_ENV"
          echo "DYNAMODB_VERIFICATION_STATUS=not_run" >> "$GITHUB_ENV"
          echo "CLOUDWATCH_VERIFICATION_STATUS=not_run" >> "$GITHUB_ENV"

          if [ "${OBSERVER_ENABLED:-false}" != "true" ]; then
            echo "goldengate-observer is not enabled for this deployment. Skipping observer runtime verification."
            echo "SOURCE_OBSERVER_STATUS=skipped" >> "$GITHUB_ENV"
            echo "TARGET_OBSERVER_STATUS=skipped" >> "$GITHUB_ENV"
            echo "DYNAMODB_VERIFICATION_STATUS=skipped" >> "$GITHUB_ENV"
            echo "CLOUDWATCH_VERIFICATION_STATUS=skipped" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ "${SOURCE_ENABLED:-false}" != "true" ] && [ "${TARGET_ENABLED:-false}" != "true" ]; then
            echo "FAIL: observer runtime verification was requested (OBSERVER_ENABLED=true) but neither source nor target is enabled for this deployment -- nothing to verify."
            exit 1
          fi

          # Bounded waits only -- this step never blocks indefinitely, and it
          # never fails merely because the observed GoldenGate status is
          # DEGRADED or DOWN. It only fails when the observer container
          # itself cannot start/keeps crashing, or cannot get at least one
          # successful DynamoDB write / CloudWatch publish within the window.
          POLL_INTERVAL_SECONDS=15
          MAX_WAIT_SECONDS=180

          wait_for_pod() {
            local component="$1"
            local elapsed=0
            local pod=""
            while [ -z "$pod" ] && [ "$elapsed" -lt "$MAX_WAIT_SECONDS" ]; do
              pod="$(kubectl get pods -n "$TARGET_NAMESPACE" \
                -l "app.kubernetes.io/instance=${RELEASE_NAME},app.kubernetes.io/component=${component}" \
                -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
              if [ -z "$pod" ]; then
                sleep "$POLL_INTERVAL_SECONDS"
                elapsed=$((elapsed + POLL_INTERVAL_SECONDS))
              fi
            done
            echo "$pod"
          }

          verify_component() {
            local component="$1"
            local main_container="$2"
            local expected_pipeline="gg-${DEPLOYMENT_ID}-${component}"

            echo "=== Verifying ${component} observer (pipeline=${expected_pipeline}) ==="

            local pod
            pod="$(wait_for_pod "$component")"

            if [ -z "$pod" ]; then
              echo "FAIL: no ${component} pod found in ${TARGET_NAMESPACE} within ${MAX_WAIT_SECONDS}s."
              exit 1
            fi

            echo "Pod: ${pod}"

            local main_state
            main_state="$(kubectl get pod "$pod" -n "$TARGET_NAMESPACE" \
              -o jsonpath="{.status.containerStatuses[?(@.name=='${main_container}')].state.running}")"
            if [ -z "$main_state" ]; then
              echo "FAIL: main container ${main_container} is not Running in pod ${pod}."
              exit 1
            fi
            echo "Main container (${main_container}): Running."

            local observer_state
            observer_state="$(kubectl get pod "$pod" -n "$TARGET_NAMESPACE" \
              -o jsonpath="{.status.containerStatuses[?(@.name=='goldengate-observer')].state.running}")"
            if [ -z "$observer_state" ]; then
              echo "FAIL: goldengate-observer container is not Running in pod ${pod}. It cannot have started successfully."
              exit 1
            fi
            echo "Observer container: Running."

            local observer_image
            observer_image="$(kubectl get pod "$pod" -n "$TARGET_NAMESPACE" \
              -o jsonpath="{.spec.containers[?(@.name=='goldengate-observer')].image}")"
            if [ "$observer_image" != "$OBSERVER_IMAGE_URI" ]; then
              echo "FAIL: goldengate-observer container in pod ${pod} is running image \"${observer_image}\", expected \"${OBSERVER_IMAGE_URI}\"."
              exit 1
            fi
            echo "Observer image matches expected: ${observer_image}"

            local restarts_before restarts_after
            restarts_before="$(kubectl get pod "$pod" -n "$TARGET_NAMESPACE" \
              -o jsonpath="{.status.containerStatuses[?(@.name=='goldengate-observer')].restartCount}")"
            sleep "$POLL_INTERVAL_SECONDS"
            restarts_after="$(kubectl get pod "$pod" -n "$TARGET_NAMESPACE" \
              -o jsonpath="{.status.containerStatuses[?(@.name=='goldengate-observer')].restartCount}")"

            echo "Observer restart count: ${restarts_before} -> ${restarts_after} (over ${POLL_INTERVAL_SECONDS}s)."
            if [ "${restarts_after:-0}" -gt "${restarts_before:-0}" ]; then
              echo "FAIL: goldengate-observer restart count increased during verification (continuously crashing)."
              exit 1
            fi

            echo "Checking /healthz inside the observer container (using its own HEALTH_LISTEN_PORT, 8080 as fallback default only)..."
            if ! kubectl exec "$pod" -n "$TARGET_NAMESPACE" -c goldengate-observer -- \
              python3 -c "
          import os
          import sys
          import urllib.request

          port = os.environ.get('HEALTH_LISTEN_PORT', '8080')
          url = 'http://127.0.0.1:%s/healthz' % port
          sys.exit(0 if urllib.request.urlopen(url, timeout=3).status == 200 else 1)
          "; then
              echo "FAIL: goldengate-observer /healthz did not respond with HTTP 200 inside pod ${pod}."
              exit 1
            fi
            echo "OK: /healthz responded with HTTP 200."

            echo "Waiting (bounded) for observer log events..."
            local elapsed=0
            local logs=""
            local have_started=false
            local have_completed=false
            local have_dynamo=false
            local have_cw=false

            while [ "$elapsed" -lt "$MAX_WAIT_SECONDS" ]; do
              logs="$(kubectl logs "$pod" -n "$TARGET_NAMESPACE" -c goldengate-observer --since=10m 2>/dev/null || true)"

              echo "$logs" | grep -q '"event": "observer_started"' && have_started=true || true
              echo "$logs" | grep -q '"event": "observation_completed"' && have_completed=true || true
              echo "$logs" | grep -q '"event": "dynamodb_update_succeeded"' && have_dynamo=true || true
              echo "$logs" | grep -q '"event": "cloudwatch_publish_succeeded"' && have_cw=true || true

              # observer_started is informational only (see below) and is
              # deliberately not part of this break condition -- an existing,
              # already-healthy pod that this deployment didn't restart has
              # no reason to log it again inside the --since=10m window, and
              # that must never make this loop wait out the full timeout.
              if [ "$have_completed" = "true" ] && [ "$have_dynamo" = "true" ] && [ "$have_cw" = "true" ]; then
                break
              fi

              sleep "$POLL_INTERVAL_SECONDS"
              elapsed=$((elapsed + POLL_INTERVAL_SECONDS))
            done

            # Informational evidence only: observer_started only logs once,
            # at process start. A pod that was already Running and healthy
            # before this workflow run (no pod-template diff, no restart)
            # legitimately never re-logs it inside the recent window --
            # that alone must not fail runtime verification.
            if [ "$have_started" = "true" ]; then
              echo "INFO: observer_started seen in the recent log window (informational only)."
            else
              echo "INFO: observer_started not seen in the recent log window -- expected for an existing pod this run did not restart. Not treated as a failure."
            fi
            echo "observation_completed seen: ${have_completed}"
            echo "dynamodb_update_succeeded seen: ${have_dynamo}"
            echo "cloudwatch_publish_succeeded seen: ${have_cw}"

            if [ "$have_completed" != "true" ]; then
              echo "FAIL: observation_completed never logged within ${MAX_WAIT_SECONDS}s (the observation loop never finished a cycle)."
              exit 1
            fi

            if [ "$have_dynamo" != "true" ]; then
              echo "FAIL: dynamodb_update_succeeded never logged within ${MAX_WAIT_SECONDS}s (observer cannot write DynamoDB state)."
              exit 1
            fi

            if [ "$have_cw" != "true" ]; then
              echo "FAIL: cloudwatch_publish_succeeded never logged within ${MAX_WAIT_SECONDS}s (observer cannot publish CloudWatch metrics)."
              exit 1
            fi

            if echo "$logs" | grep -qi "AccessDeniedException"; then
              echo "FAIL: AccessDeniedException found in observer logs for pod ${pod}."
              exit 1
            fi

            echo "Verifying the DynamoDB record via the observer's own IRSA identity (GetItem only, no Scan)..."
            local ddb_check
            ddb_check="$(kubectl exec "$pod" -n "$TARGET_NAMESPACE" -c goldengate-observer -- python3 -c "
          import os
          import time
          import boto3

          table = boto3.resource('dynamodb', region_name=os.environ['AWS_REGION']).Table(os.environ['DYNAMODB_TABLE'])
          resp = table.get_item(Key={'pipeline': os.environ['PIPELINE'], 'recordType': 'STATE#_deployment'})
          item = resp.get('Item')
          if not item:
              print('MISSING_ITEM')
              raise SystemExit(0)

          component_ok = item.get('component') == os.environ['COMPONENT']
          deployment_ok = item.get('deploymentId') == os.environ['DEPLOYMENT_ID']
          recorded_at = item.get('recordedAt')
          recent_ok = bool(recorded_at) and (time.time() - float(recorded_at)) < 900
          status_ok = item.get('status') in ('HEALTHY', 'DEGRADED', 'DOWN')
          no_ttl = 'ttl' not in item
          no_secret_fields = not any(k.lower() in ('password', 'secret', 'credential', 'token') for k in item.keys())

          print('component_ok=%s' % component_ok)
          print('deployment_ok=%s' % deployment_ok)
          print('recent_ok=%s' % recent_ok)
          print('status_ok=%s' % status_ok)
          print('no_ttl=%s' % no_ttl)
          print('no_secret_fields=%s' % no_secret_fields)
          print('status=%s' % item.get('status'))
          " 2>&1)"

            echo "$ddb_check"

            if echo "$ddb_check" | grep -q "MISSING_ITEM"; then
              echo "FAIL: expected DynamoDB record (pipeline=${expected_pipeline}) does not exist."
              exit 1
            fi

            if echo "$ddb_check" | grep -qE "component_ok=False|deployment_ok=False|recent_ok=False|status_ok=False|no_ttl=False|no_secret_fields=False"; then
              echo "FAIL: DynamoDB record for ${expected_pipeline} failed one or more verification checks above."
              exit 1
            fi

            echo "OK: ${component} observer verified (DynamoDB record present and CloudWatch publish succeeded)."
          }

          if [ "${SOURCE_ENABLED:-false}" = "true" ]; then
            verify_component "source" "${SOURCE_MAIN_CONTAINER:-ogg-oracle}"
            echo "SOURCE_OBSERVER_STATUS=passed" >> "$GITHUB_ENV"
          else
            echo "Source is not enabled for this deployment. Not waiting for a source pod."
            echo "SOURCE_OBSERVER_STATUS=skipped_disabled" >> "$GITHUB_ENV"
          fi

          if [ "${TARGET_ENABLED:-false}" = "true" ]; then
            verify_component "target" "${TARGET_MAIN_CONTAINER:-ogg-postgresql}"
            echo "TARGET_OBSERVER_STATUS=passed" >> "$GITHUB_ENV"
          else
            echo "Target is not enabled for this deployment. Not waiting for a target pod."
            echo "TARGET_OBSERVER_STATUS=skipped_disabled" >> "$GITHUB_ENV"
          fi

          # Reached only if every enabled component's verify_component call
          # above succeeded (verify_component exits 1 immediately on any
          # failure, which stops this script before these lines run).
          echo "DYNAMODB_VERIFICATION_STATUS=passed" >> "$GITHUB_ENV"
          echo "CLOUDWATCH_VERIFICATION_STATUS=passed" >> "$GITHUB_ENV"

          echo ""
          echo "OK: all enabled GoldenGate observers passed runtime verification."
          echo ""
          echo "Independent CloudWatch console verification (requires a read-capable identity;"
          echo "the observer role intentionally has PutMetricData only, not CloudWatch read):"
          echo "  aws cloudwatch list-metrics --namespace GoldenGate/Pipelines --region ${AWS_REGION}"
          echo "  aws cloudwatch get-metric-statistics --namespace GoldenGate/Pipelines \\"
          echo "    --metric-name DeploymentHealthy --start-time \$(date -u -d '-1 hour' +%Y-%m-%dT%H:%M:%SZ) \\"
          echo "    --end-time \$(date -u +%Y-%m-%dT%H:%M:%SZ) --period 300 --statistics Maximum \\"
          echo "    --dimensions Name=Pipeline,Value=gg-${DEPLOYMENT_ID}-source Name=Component,Value=source Name=Engine,Value=oracle \\"
          echo "    --region ${AWS_REGION}"

      - name: Upload rendered manifests and chart package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goldengate-helm-artifacts-${{ matrix.environment }}-${{ matrix.deployment_id }}
          path: |
            rendered/
            packaged/
            pulled/
          if-no-files-found: warn
          retention-days: 7

      - name: Workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## GoldenGate EKS Argo CD-based Deploy Summary"
            echo ""
            echo "### Deployment details"
            echo ""
            echo "- Environment: \`${ENVIRONMENT}\`"
            echo "- Deployment ID: \`${DEPLOYMENT_ID}\`"
            echo "- Target namespace: \`${TARGET_NAMESPACE}\`"
            echo "- Argo CD Application: \`${ARGOCD_APP_NAME}\` (namespace: \`${ARGOCD_NAMESPACE}\`)"
            echo "- Helm releaseName (used by Argo CD): \`${RELEASE_NAME}\`"
            echo "- Values file: \`${VALUES_FILE}\`"
            echo "- Deploy enabled: \`${{ matrix.deploy }}\`"
            echo ""
            echo "### AWS / EKS details"
            echo ""
            echo "- AWS region: \`${AWS_REGION}\`"
            echo "- ECR registry: \`${ECR_REGISTRY}\`"
            echo "- EKS account ID: \`${EKS_ACCOUNT_ID}\`"
            echo "- EKS cluster name: \`${EKS_CLUSTER_NAME}\`"
            echo "- EKS cluster ARN: \`${EKS_CLUSTER_ARN}\`"
            echo ""
            echo "### Published Helm OCI chart"
            echo ""
            echo "- Chart ref: \`${HELM_CHART_REF}\`"
            echo "- Chart version: \`${CHART_VERSION}\`"
            echo "- ECR OCI repo: \`${HELM_ECR_REPOSITORY}\`"
            echo ""
            echo "### GoldenGate observer"
            echo ""
            echo "- Observer changed this trigger: \`${{ needs.detect_changed_deployments.outputs.observer_changed }}\`"
            echo "- Observer tree SHA (monitoring/observer): \`${{ needs.detect_changed_deployments.outputs.observer_tree_sha }}\`"
            echo "- Observer image tag: \`${OBSERVER_IMAGE_TAG}\`"
            echo "- Observer image URI: \`${OBSERVER_IMAGE_URI}\`"
            echo "- Observer image digest: \`${{ needs.ensure_observer_image.outputs.image_digest }}\`"
            echo "- Image already existed in ECR (reused, not rebuilt): \`${{ needs.ensure_observer_image.outputs.image_existed }}\`"
            echo "- Selected deployments this run: \`${{ needs.detect_changed_deployments.outputs.deployment_matrix }}\`"
            echo "- Source observer verification: \`${SOURCE_OBSERVER_STATUS}\`"
            echo "- Target observer verification: \`${TARGET_OBSERVER_STATUS}\`"
            echo "- DynamoDB record verification: \`${DYNAMODB_VERIFICATION_STATUS}\`"
            echo "- CloudWatch PutMetricData verification: \`${CLOUDWATCH_VERIFICATION_STATUS}\` (based on observer log evidence only -- the observer role has no CloudWatch read permission)"
            echo ""
            echo "The observer image is built at most once per workflow run, in the"
            echo "\`ensure_observer_image\` job, outside this deployment matrix. A Helm-only or"
            echo "deployment-values-only change reuses the existing content-addressed image."
            echo "Observer failures never trigger GoldenGate process control -- the observer is"
            echo "strictly passive and fail-open."
            echo ""
            echo "Independent CloudWatch verification (read-capable identity required):"
            echo ""
            echo "\`\`\`bash"
            echo "aws cloudwatch list-metrics --namespace GoldenGate/Pipelines --region ${AWS_REGION}"
            echo "\`\`\`"
            echo ""
            echo "### ECR repository policy prerequisites"
            echo ""
            echo "The \"Ensure Helm ECR repository policy allows Argo CD pull\" step requires the"
            echo "GitHub Actions workflow role (\`${ROLE_ARN}\`) to have \`ecr:GetRepositoryPolicy\`"
            echo "and \`ecr:SetRepositoryPolicy\` on \`${HELM_ECR_REPOSITORY}\`. If that step failed"
            echo "above with an access-denied error, grant those two actions to the role before"
            echo "re-running."
            echo ""
            echo "### Ownership"
            echo ""
            echo "Argo CD owns create/update/delete of this GoldenGate deployment's Kubernetes"
            echo "resources. GitHub Actions only packages/publishes the Helm OCI chart and"
            echo "creates/updates the Argo CD Application resource -- it does not run"
            echo "\`helm upgrade --install\` or \`helm uninstall\` against the cluster."
            echo ""
            echo "Argo CD ECR OCI repository credentials are expected to be maintained by the"
            echo "in-cluster token refresh component using IRSA role GoldenGateArgocdECRRead-dev."
            echo "GitHub Actions ensures the helm/goldengate ECR repository policy grants that"
            echo "role pull access on every run, but is not the long-term source of Argo CD's"
            echo "ECR credentials."
            echo ""
            echo "A deployment can be removed either by deleting its folder/values.yaml or by"
            echo "making values.yaml inactive using comment-only/empty content or an explicit"
            echo "disable flag. Inactive values files are treated as deployment removals. A"
            echo "values.yaml is inactive when it is missing, empty/comment-only, enabled=false,"
            echo "deployment.enabled=false, or lifecycle.state=absent."
            echo ""
            echo "### Validation commands"
            echo ""
            echo "\`\`\`bash"
            echo "kubectl get application ${ARGOCD_APP_NAME} -n ${ARGOCD_NAMESPACE} -o wide"
            echo "kubectl describe application ${ARGOCD_APP_NAME} -n ${ARGOCD_NAMESPACE}"
            echo "kubectl get all -n ${TARGET_NAMESPACE}"
            echo "kubectl get pvc -n ${TARGET_NAMESPACE}"
            echo "kubectl get ingress -n ${TARGET_NAMESPACE}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  delete_removed_argocd_applications:
    name: Delete removed GoldenGate Argo CD Applications

    needs: detect_changed_deployments
    if: github.event_name == 'push' && needs.detect_changed_deployments.outputs.has_deletions == 'true'

    runs-on: codebuild-${{ vars.PROJECT_NAME_DEV }}-${{ github.run_id }}-${{ github.run_attempt }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect_changed_deployments.outputs.deletion_matrix) }}

    concurrency:
      group: goldengate-argocd-delete-${{ github.ref }}-${{ matrix.environment }}-${{ matrix.deployment_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_ARN }}

      - name: Install kubectl if missing
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking/installing kubectl..."

          if ! command -v kubectl >/dev/null 2>&1; then
            KUBECTL_VERSION="v1.35.0"

            ARCH="$(uname -m)"
            case "$ARCH" in
              x86_64)
                KUBECTL_ARCH="amd64"
                ;;
              aarch64|arm64)
                KUBECTL_ARCH="arm64"
                ;;
              *)
                echo "Unsupported architecture for kubectl: $ARCH"
                exit 1
                ;;
            esac

            curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${KUBECTL_ARCH}/kubectl" -o /tmp/kubectl
            sudo mv /tmp/kubectl /usr/local/bin/kubectl
            sudo chmod +x /usr/local/bin/kubectl
          fi

          kubectl version --client=true

      - name: Verify AWS identity and kubectl
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking AWS identity..."
          aws sts get-caller-identity

          echo "Checking kubectl..."
          kubectl version --client=true

      - name: Prepare deletion variables
        shell: bash
        run: |
          set -euo pipefail

          ENVIRONMENT="${{ matrix.environment }}"
          DEPLOYMENT_ID="${{ matrix.deployment_id }}"

          if [[ ! "$DEPLOYMENT_ID" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]]; then
            echo "Invalid deployment_id: $DEPLOYMENT_ID"
            echo "Use lowercase letters, numbers, and hyphens only."
            exit 1
          fi

          ARGOCD_NAMESPACE="argocd"
          ARGOCD_APP_NAME="goldengate-${DEPLOYMENT_ID}"
          TARGET_NAMESPACE="gg-${ENVIRONMENT}-${DEPLOYMENT_ID}"

          echo "ENVIRONMENT=${ENVIRONMENT}" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> "$GITHUB_ENV"
          echo "ARGOCD_NAMESPACE=${ARGOCD_NAMESPACE}" >> "$GITHUB_ENV"
          echo "ARGOCD_APP_NAME=${ARGOCD_APP_NAME}" >> "$GITHUB_ENV"
          echo "TARGET_NAMESPACE=${TARGET_NAMESPACE}" >> "$GITHUB_ENV"

          echo "Deletion target:"
          echo "Environment: ${ENVIRONMENT}"
          echo "Deployment ID: ${DEPLOYMENT_ID}"
          echo "Argo CD Application: ${ARGOCD_APP_NAME}"
          echo "Target namespace: ${TARGET_NAMESPACE}"

      - name: Connect to EKS cluster
        shell: bash
        run: |
          set -euo pipefail

          echo "Connecting to EKS using cross-account EKS deploy role:"
          echo "${EKS_DEPLOY_ROLE_ARN}"

          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}" \
            --role-arn "${EKS_DEPLOY_ROLE_ARN}" \
            --assume-role-arn "${EKS_DEPLOY_ROLE_ARN}"

          echo "Current kube context:"
          kubectl config current-context

      - name: Delete Argo CD Application
        shell: bash
        run: |
          set -euo pipefail

          if kubectl get application "$ARGOCD_APP_NAME" -n "$ARGOCD_NAMESPACE" >/dev/null 2>&1; then
            echo "Argo CD Application ${ARGOCD_APP_NAME} found. Deleting..."

            kubectl patch application "$ARGOCD_APP_NAME" \
              -n "$ARGOCD_NAMESPACE" \
              --type merge \
              -p '{"metadata":{"finalizers":["resources-finalizer.argocd.argoproj.io"]}}'

            kubectl delete application "$ARGOCD_APP_NAME" \
              -n "$ARGOCD_NAMESPACE" \
              --wait=true \
              --timeout=10m

            echo "Argo CD Application ${ARGOCD_APP_NAME} deleted."
            echo "Argo CD will cascade-delete its managed resources in ${TARGET_NAMESPACE}."
          else
            echo "Argo CD Application ${ARGOCD_APP_NAME} not found in namespace ${ARGOCD_NAMESPACE}. Nothing to delete."
          fi

      - name: Clean up remaining GoldenGate namespace if still present
        shell: bash
        run: |
          set -euo pipefail

          # CreateNamespace=true only guarantees the namespace exists for
          # sync -- it is not a guaranteed cleanup mechanism on Application
          # deletion. This is a guarded fallback: it only deletes the
          # namespace when it still exists AND carries exactly the
          # ownership labels this deployment would have set, so it can
          # never touch a namespace it doesn't unambiguously own.
          if kubectl get namespace "$TARGET_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace ${TARGET_NAMESPACE} still exists after Argo CD Application deletion. Verifying ownership labels before cleanup..."

            APP_NAME_LABEL="$(kubectl get namespace "$TARGET_NAMESPACE" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/name}' 2>/dev/null || true)"
            MANAGED_BY_LABEL="$(kubectl get namespace "$TARGET_NAMESPACE" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}' 2>/dev/null || true)"
            ENV_LABEL="$(kubectl get namespace "$TARGET_NAMESPACE" -o jsonpath='{.metadata.labels.goldengate\.adcb/environment}' 2>/dev/null || true)"
            DEPLOYMENT_LABEL="$(kubectl get namespace "$TARGET_NAMESPACE" -o jsonpath='{.metadata.labels.goldengate\.adcb/deployment-id}' 2>/dev/null || true)"

            if [ "$APP_NAME_LABEL" = "goldengate" ] &&
               [ "$MANAGED_BY_LABEL" = "argocd" ] &&
               [ "$ENV_LABEL" = "$ENVIRONMENT" ] &&
               [ "$DEPLOYMENT_LABEL" = "$DEPLOYMENT_ID" ]; then
              echo "Namespace labels match expected GoldenGate ownership. Deleting namespace ${TARGET_NAMESPACE}..."
              kubectl delete namespace "$TARGET_NAMESPACE" --wait=true --timeout=10m
            else
              echo "Namespace ${TARGET_NAMESPACE} still exists but ownership labels do not match expected values."
              echo "app.kubernetes.io/name=${APP_NAME_LABEL}"
              echo "app.kubernetes.io/managed-by=${MANAGED_BY_LABEL}"
              echo "goldengate.adcb/environment=${ENV_LABEL}"
              echo "goldengate.adcb/deployment-id=${DEPLOYMENT_LABEL}"
              echo "Refusing to delete namespace automatically."
              exit 1
            fi
          else
            echo "Namespace ${TARGET_NAMESPACE} already removed."
          fi

      - name: Workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## GoldenGate Argo CD Application Deletion Summary"
            echo ""
            echo "- Environment: \`${ENVIRONMENT}\`"
            echo "- Deployment ID: \`${DEPLOYMENT_ID}\`"
            echo "- Argo CD Application: \`${ARGOCD_APP_NAME}\` (namespace: \`${ARGOCD_NAMESPACE}\`)"
            echo "- Target namespace: \`${TARGET_NAMESPACE}\`"
            echo "- Delete requested: \`true\`"
            echo ""
            echo "Argo CD cascade deletion removes the Application-managed resources. The"
            echo "workflow also performs a guarded namespace cleanup only when the remaining"
            echo "namespace has the expected GoldenGate ownership labels."
          } >> "$GITHUB_STEP_SUMMARY"
