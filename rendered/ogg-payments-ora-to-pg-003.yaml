apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ogg-oracle
  namespace: "gg-dev-payments-ora-to-pg-003"
  labels:
    app.kubernetes.io/name: goldengate
    app.kubernetes.io/instance: ogg-payments-ora-to-pg-003
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: goldengate-0.2.8
    app.kubernetes.io/part-of: goldengate
    goldengate.adcb/environment: "dev"
    goldengate.adcb/deployment-id: "payments-ora-to-pg-003"
    app.kubernetes.io/component: source
    app.kubernetes.io/engine: "oracle"
spec:
  serviceName: ogg-oracle-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ogg-oracle
      app.kubernetes.io/instance: ogg-payments-ora-to-pg-003
      app.kubernetes.io/component: source
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goldengate
        app.kubernetes.io/instance: ogg-payments-ora-to-pg-003
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: goldengate-0.2.8
        app.kubernetes.io/part-of: goldengate
        goldengate.adcb/environment: "dev"
        goldengate.adcb/deployment-id: "payments-ora-to-pg-003"
        app.kubernetes.io/name: ogg-oracle
        app.kubernetes.io/instance: ogg-payments-ora-to-pg-003
        app.kubernetes.io/component: source
        app.kubernetes.io/engine: "oracle"
    spec:
      serviceAccountName: ogg-oracle-sa
      initContainers:
        - name: prepare-u02-permissions
          image: "229410149234.dkr.ecr.eu-west-1.amazonaws.com/ogg-oracle:23.26.2.0.1"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e

              echo "Preparing writable GoldenGate runtime directories..."

              mkdir -p /u02/oggf
              rm -rf /u02/oggf/certificate
              mkdir -p /u02/oggf/certificate
              mkdir -p /u03

              echo "Applying temporary test permissions..."
              chown -R 0:0 /u02 /u03 || true
              chmod -R 0777 /u02 /u03

              echo "Testing write access..."
              touch /u02/oggf/certificate/write-test.txt
              echo "ok" > /u02/oggf/certificate/write-test.txt
              rm -f /u02/oggf/certificate/write-test.txt

              echo "Directory permissions after update:"
              ls -ld /u02
              ls -ld /u02/oggf
              ls -ld /u02/oggf/certificate
              ls -ld /u03
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: u02
              mountPath: /u02
            - name: u03
              mountPath: /u03
            - name: ogg-admin-csi
              mountPath: "/mnt/secrets-store/admin"
              readOnly: true

      containers:
        - name: ogg-oracle
          image: "229410149234.dkr.ecr.eu-west-1.amazonaws.com/ogg-oracle:23.26.2.0.1"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 0
            runAsUser: 0

          env:
            - name: OGG_ADMIN
              valueFrom:
                secretKeyRef:
                  name: ogg-oracle-admin
                  key: OGG_ADMIN

            - name: OGG_ADMIN_PWD
              valueFrom:
                secretKeyRef:
                  name: ogg-oracle-admin
                  key: OGG_ADMIN_PWD

            - name: OGG_DEPLOYMENT
              value: "OracleSource"

            - name: OGG_DOMAIN
              value: "ogg-oracle.gg-dev-payments-ora-to-pg-003.svc.cluster.local"

            - name: OGG_SECURE_DEPLOYMENT
              value: "false"

          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: dist
              containerPort: 9013
              protocol: TCP
            - name: metrics
              containerPort: 9015
              protocol: TCP

          volumeMounts:
            - name: u02
              mountPath: /u02

            - name: u03
              mountPath: /u03
            - name: ogg-admin-csi
              mountPath: "/mnt/secrets-store/admin"
              readOnly: true

            - name: ogg-nginx-cert-csi
              mountPath: "/etc/nginx/cert"
              readOnly: true

          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 20

          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 240
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 8

      volumes:
        - name: u02
          emptyDir: {}

        - name: u03
          emptyDir: {}
        - name: ogg-admin-csi
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "ogg-oracle-admin"

        - name: ogg-nginx-cert-csi
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "ogg-oracle-certificate"
