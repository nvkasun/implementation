# Source: goldengate/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ogg-payments-ora-to-pg-003-ingress
  namespace: "gg-dev-payments-ora-to-pg-003"
  labels:
    app.kubernetes.io/name: goldengate
    app.kubernetes.io/instance: ogg-payments-ora-to-pg-003
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: goldengate-0.2.8
    app.kubernetes.io/part-of: goldengate
    goldengate.adcb/environment: "dev"
    goldengate.adcb/deployment-id: "payments-ora-to-pg-003"
  annotations:
    # Application/group-level annotations. Safe to set regardless of mode:
    # every Ingress in an ALB group must agree on these, and GoldenGate
    # only ever runs its own backend/health-check settings here.
    alb.ingress.kubernetes.io/backend-protocol: "HTTPS"
    alb.ingress.kubernetes.io/healthcheck-protocol: "HTTPS"
    alb.ingress.kubernetes.io/healthcheck-port: "traffic-port"
    alb.ingress.kubernetes.io/healthcheck-path: "/"
    alb.ingress.kubernetes.io/success-codes: "200-499"
    alb.ingress.kubernetes.io/group.name: "gg-poc-dev-alb"
    alb.ingress.kubernetes.io/group.order: "110"
    # listen-ports tells the controller which listener(s) this Ingress's
    # rules attach to. It is required even in shared mode: the resident
    # Ingress owns the listener/certificate, but each joining Ingress must
    # still declare its own rules' listener or they are never attached to
    # HTTPS 443 and requests fall through to the ALB default 404 action.
    alb.ingress.kubernetes.io/listen-ports: "[{\"HTTPS\":443}]"
    # certificate-arn is required whenever this Ingress declares an HTTPS
    # listener (listen-ports contains HTTPS), even in shared mode: without
    # it the controller falls back to per-Ingress host-based ACM discovery,
    # which fails for hosts that don't match a discoverable certificate
    # (e.g. temporary/local hostnames) with "no certificate found for host".
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-west-1:668311715351:certificate/0a2ab950-8d20-456c-b43f-a3987f7d1841"
    # target-type is a per-TargetGroup setting, not an ALB-level setting: it
    # is required in shared mode too. Our backend Services are ClusterIP, so
    # without target-type=ip the controller defaults to instance mode, which
    # requires NodePort/LoadBalancer Services and fails with "TargetGroup
    # port is empty" against a ClusterIP Service.
    alb.ingress.kubernetes.io/target-type: "ip"
spec:
  ingressClassName: alb
  rules:
    - host: "ogg-oracle-payments-ora-to-pg-003.goldengate-dev.adcbmis.local"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ogg-oracle
                port:
                  name: https
    - host: "ogg-postgresql-payments-ora-to-pg-003.goldengate-dev.adcbmis.local"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ogg-postgresql
                port:
                  name: https
