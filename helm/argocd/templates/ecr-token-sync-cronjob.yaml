{{- if and .Values.ecrTokenSync .Values.ecrTokenSync.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.ecrTokenSync.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: argocd-ecr-token-sync
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  schedule: {{ .Values.ecrTokenSync.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      # restartPolicy: Never (not OnFailure) so a failed attempt produces
      # its own Pod that stays around (subject to the history limits above)
      # instead of the Job controller restarting/deleting a single Pod in
      # place -- that's what makes `kubectl logs` on a failed run possible.
      template:
        metadata:
          labels:
            app.kubernetes.io/name: argocd-ecr-token-sync
            app.kubernetes.io/part-of: argocd
        spec:
          serviceAccountName: {{ .Values.ecrTokenSync.serviceAccountName }}
          restartPolicy: Never
          containers:
            - name: ecr-token-sync
              image: "{{ .Values.ecrTokenSync.image.repository }}:{{ .Values.ecrTokenSync.image.tag }}"
              imagePullPolicy: {{ .Values.ecrTokenSync.image.pullPolicy }}
              # allowPrivilegeEscalation/capabilities are always safe to force.
              # readOnlyRootFilesystem/runAsNonRoot are intentionally not set
              # here: the aws-cloud-factory-infra-aws-kubectl image's default
              # user and writable paths (aws/kubectl config caches) aren't
              # verified, and forcing either could break the CronJob.
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: AWS_REGION
                  value: {{ .Values.ecrTokenSync.awsRegion | quote }}
                - name: ECR_REGISTRY
                  value: {{ .Values.ecrTokenSync.ecrRegistry | quote }}
                - name: HELM_OCI_REPOSITORY
                  value: {{ .Values.ecrTokenSync.helmOciRepository | quote }}
                - name: ARGOCD_REPOSITORY_SECRET_NAME
                  value: {{ .Values.ecrTokenSync.argocdRepositorySecretName | quote }}
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                # No securityContext.runAsNonRoot is set on this container (see
                # the comment above), so the AWS CLI defaults to $HOME=/root
                # and tries to write ~/.aws -- a path this container can't
                # write to. Point it at /tmp instead, which is always
                # writable regardless of which user the image runs as.
                - name: HOME
                  value: /tmp
                - name: AWS_CONFIG_FILE
                  value: /tmp/.aws/config
                - name: AWS_SHARED_CREDENTIALS_FILE
                  value: /tmp/.aws/credentials
                - name: AWS_EC2_METADATA_DISABLED
                  value: "true"
                - name: XDG_CACHE_HOME
                  value: /tmp/.cache
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  mkdir -p /tmp/.aws /tmp/.cache

                  echo "Refreshing Argo CD ECR OCI repository credential..."
                  echo "Target Secret: ${ARGOCD_REPOSITORY_SECRET_NAME}"
                  echo "Namespace: ${POD_NAMESPACE}"
                  echo "Repository URL: oci://${ECR_REGISTRY}/${HELM_OCI_REPOSITORY}"

                  echo "Runtime user:"
                  id

                  echo "HOME=${HOME}"
                  echo "AWS_CONFIG_FILE=${AWS_CONFIG_FILE}"
                  echo "AWS_SHARED_CREDENTIALS_FILE=${AWS_SHARED_CREDENTIALS_FILE}"

                  echo "AWS caller identity:"
                  aws sts get-caller-identity

                  echo "Kubernetes RBAC diagnostics:"
                  kubectl auth can-i get secret "${ARGOCD_REPOSITORY_SECRET_NAME}" -n "${POD_NAMESPACE}" || true
                  kubectl auth can-i create secret -n "${POD_NAMESPACE}" || true
                  kubectl auth can-i update secret "${ARGOCD_REPOSITORY_SECRET_NAME}" -n "${POD_NAMESPACE}" || true
                  kubectl auth can-i patch secret "${ARGOCD_REPOSITORY_SECRET_NAME}" -n "${POD_NAMESPACE}" || true

                  ECR_PASSWORD="$(aws ecr get-login-password --region "$AWS_REGION")"

                  # kubectl apply reads the heredoc directly on its own stdin
                  # here -- no "cat | kubectl apply" pipe. That older pipe
                  # form runs kubectl and cat as two processes tied together
                  # by set -o pipefail; if kubectl finishes and closes its
                  # end of the pipe while cat is still writing, cat gets
                  # SIGPIPE, exits non-zero, and pipefail fails the whole
                  # pipeline -- even though kubectl already applied the
                  # Secret successfully. Redirecting the heredoc straight
                  # into kubectl's stdin removes that second process and
                  # the race entirely.
                  kubectl apply -f - <<EOF
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: ${ARGOCD_REPOSITORY_SECRET_NAME}
                    namespace: ${POD_NAMESPACE}
                    labels:
                      argocd.argoproj.io/secret-type: repository
                  stringData:
                    type: oci
                    url: oci://${ECR_REGISTRY}/${HELM_OCI_REPOSITORY}
                    username: AWS
                    password: ${ECR_PASSWORD}
                  EOF

                  unset ECR_PASSWORD

                  kubectl get secret "${ARGOCD_REPOSITORY_SECRET_NAME}" -n "${POD_NAMESPACE}" \
                    -o jsonpath='{.metadata.name}{" refreshed with "}{.metadata.labels.argocd\.argoproj\.io/secret-type}{" label\n"}'

                  echo "Argo CD ECR OCI repository credential refreshed successfully."
{{- end }}
