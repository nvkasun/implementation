{{- if .Values.source.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "goldengate.sourceName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "goldengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: source
    app.kubernetes.io/engine: {{ .Values.source.engine | quote }}
spec:
  type: {{ .Values.source.service.type | default "ClusterIP" }}
  selector:
    {{- include "goldengate.sourceSelectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.source.service.ports.https }}
      targetPort: https
      protocol: TCP
    - name: dist
      port: {{ .Values.source.service.ports.dist }}
      targetPort: dist
      protocol: TCP
    - name: metrics
      port: {{ .Values.source.service.ports.metrics }}
      targetPort: metrics
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "goldengate.sourceHeadlessName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "goldengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: source
    app.kubernetes.io/engine: {{ .Values.source.engine | quote }}
spec:
  clusterIP: None
  selector:
    {{- include "goldengate.sourceSelectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.source.service.ports.https }}
      targetPort: https
      protocol: TCP
    - name: dist
      port: {{ .Values.source.service.ports.dist }}
      targetPort: dist
      protocol: TCP
    - name: metrics
      port: {{ .Values.source.service.ports.metrics }}
      targetPort: metrics
      protocol: TCP
{{- end }}