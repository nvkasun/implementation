{{- if and .Values.source.enabled .Values.persistence.enabled (eq .Values.persistence.provider "efs") (eq .Values.source.storage.u02.type "efs") (not .Values.source.storage.u02.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "goldengate.sourceU02PVCName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: goldengate
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: source
    goldengate.adcb/environment: {{ .Values.global.environment | quote }}
    goldengate.adcb/deployment-id: {{ .Values.global.deploymentId | quote }}
spec:
  accessModes:
    {{- toYaml .Values.source.storage.u02.accessModes | nindent 4 }}
  storageClassName: {{ include "goldengate.efsStorageClassName" . }}
  resources:
    requests:
      storage: {{ .Values.source.storage.u02.size }}
{{- end }}
