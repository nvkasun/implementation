{{- if and .Values.source.enabled .Values.source.csi.enabled }}
{{- if .Values.source.csi.admin.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ required "source.csi.admin.providerClassName is required when source.csi.admin.enabled=true" .Values.source.csi.admin.providerClassName }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "goldengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: source
    app.kubernetes.io/engine: {{ .Values.source.engine | quote }}
spec:
  provider: aws
  secretObjects:
    - secretName: {{ required "source.csi.admin.secretName is required when source.csi.admin.enabled=true" .Values.source.csi.admin.secretName }}
      type: Opaque
      data:
        - objectName: OGG_ADMIN
          key: {{ .Values.source.admin.usernameKey | default "OGG_ADMIN" }}
        - objectName: OGG_ADMIN_PWD
          key: {{ .Values.source.admin.passwordKey | default "OGG_ADMIN_PWD" }}
  parameters:
    region: {{ .Values.source.csi.region | quote }}
    objects: |
      - objectName: "{{ required "source.csi.admin.objectName is required when source.csi.admin.enabled=true" .Values.source.csi.admin.objectName }}"
        objectType: "{{ .Values.source.csi.admin.objectType | default "secretsmanager" }}"
        jmesPath:
{{- range .Values.source.csi.admin.jmesPath }}
          - path: "{{ .path }}"
            objectAlias: "{{ .objectAlias }}"
{{- end }}
---
{{- end }}
{{- if .Values.source.csi.certificate.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ required "source.csi.certificate.providerClassName is required when source.csi.certificate.enabled=true" .Values.source.csi.certificate.providerClassName }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "goldengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: source
    app.kubernetes.io/engine: {{ .Values.source.engine | quote }}
spec:
  provider: aws
  parameters:
    region: {{ .Values.source.csi.region | quote }}
    objects: |
      - objectName: "{{ required "source.csi.certificate.objectName is required when source.csi.certificate.enabled=true" .Values.source.csi.certificate.objectName }}"
        objectType: "{{ .Values.source.csi.certificate.objectType | default "secretsmanager" }}"
        jmesPath:
{{- range .Values.source.csi.certificate.jmesPath }}
          - path: "{{ .path }}"
            objectAlias: "{{ .objectAlias }}"
{{- end }}
{{- end }}
{{- end }}