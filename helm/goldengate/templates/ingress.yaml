{{- if .Values.ingress.enabled }}
{{- if and .Values.source.enabled (not .Values.ingress.hosts.source) }}
{{- fail "ingress.hosts.source is required when ingress.enabled=true and source.enabled=true" }}
{{- end }}
{{- if and .Values.target.enabled (not .Values.ingress.hosts.target) }}
{{- fail "ingress.hosts.target is required when ingress.enabled=true and target.enabled=true" }}
{{- end }}
{{- if and (contains "HTTPS" .Values.ingress.alb.listenPorts) (not .Values.ingress.alb.certificateArn) }}
{{- fail "ingress.alb.certificateArn is required when HTTPS listener is enabled" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "goldengate.fullname" . }}-ingress
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "goldengate.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.alb.scheme | quote }}
    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.alb.targetType | quote }}
    alb.ingress.kubernetes.io/backend-protocol: {{ .Values.ingress.alb.backendProtocol | quote }}
    alb.ingress.kubernetes.io/listen-ports: {{ .Values.ingress.alb.listenPorts | quote }}
    alb.ingress.kubernetes.io/healthcheck-protocol: {{ .Values.ingress.alb.healthcheckProtocol | quote }}
    alb.ingress.kubernetes.io/healthcheck-port: {{ .Values.ingress.alb.healthcheckPort | quote }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.alb.healthcheckPath | quote }}
    alb.ingress.kubernetes.io/success-codes: {{ .Values.ingress.alb.successCodes | quote }}
{{- if .Values.ingress.alb.groupName }}
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.alb.groupName | quote }}
{{- end }}
{{- if .Values.ingress.alb.groupOrder }}
    alb.ingress.kubernetes.io/group.order: {{ .Values.ingress.alb.groupOrder | quote }}
{{- end }}
{{- if .Values.ingress.alb.certificateArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.alb.certificateArn | quote }}
{{- end }}
{{- if .Values.ingress.alb.sslPolicy }}
    alb.ingress.kubernetes.io/ssl-policy: {{ .Values.ingress.alb.sslPolicy | quote }}
{{- end }}
{{- if .Values.ingress.alb.sslRedirect }}
    alb.ingress.kubernetes.io/ssl-redirect: {{ .Values.ingress.alb.sslRedirect | quote }}
{{- end }}
{{- if .Values.ingress.alb.subnets }}
    alb.ingress.kubernetes.io/subnets: {{ .Values.ingress.alb.subnets | quote }}
{{- end }}
{{- if .Values.ingress.alb.securityGroups }}
    alb.ingress.kubernetes.io/security-groups: {{ .Values.ingress.alb.securityGroups | quote }}
{{- end }}
{{- if .Values.ingress.alb.inboundCidrs }}
    alb.ingress.kubernetes.io/inbound-cidrs: {{ .Values.ingress.alb.inboundCidrs | quote }}
{{- end }}
{{- if .Values.ingress.alb.loadBalancerAttributes }}
    alb.ingress.kubernetes.io/load-balancer-attributes: {{ .Values.ingress.alb.loadBalancerAttributes | quote }}
{{- end }}
{{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
{{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "alb" }}
  rules:
{{- if and .Values.source.enabled .Values.ingress.hosts.source }}
    - host: {{ .Values.ingress.hosts.source | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "goldengate.sourceName" . }}
                port:
                  name: https
{{- end }}
{{- if and .Values.target.enabled .Values.ingress.hosts.target }}
    - host: {{ .Values.ingress.hosts.target | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "goldengate.targetName" . }}
                port:
                  name: https
{{- end }}
{{- end }}
